        if (!violations.isEmpty()) {
            throw new GradleException("Content/version adapter escape hatch is forbidden:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyNoContentVersionAdapters] passed. No content-owned version/loader adapter modules detected.')
