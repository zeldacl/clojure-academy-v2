tasks.register('verifyAotBootstrapSafetyNegativeFixture') {
    group = 'verification'
    description = 'Verify AOT linter fails on an intentional top-level registry-touch fixture with precise diagnostics.'

    def lintScript = file('tools/aot-linter/aot_safety.clj')
    def fixtureFile = file('tools/aot-linter/fixtures/bad_top_level_registry.clj')

    inputs.file(lintScript)
        .withPropertyName('aotLintScriptNegativeFixture')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    inputs.file(fixtureFile)
        .withPropertyName('aotLintNegativeFixtureSource')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)

    doLast {
        def output = new ByteArrayOutputStream()
        def result = javaexec {
            classpath = configurations.detachedConfiguration(
                dependencies.create('org.clojure:clojure:1.12.4'),
                dependencies.create('org.clojure:tools.reader:1.3.6')
            )
            mainClass = 'clojure.main'
            args lintScript.absolutePath
            systemProperty 'aot.lint.sourceDirs', 'tools/aot-linter/fixtures'
            workingDir = project.rootDir
            standardOutput = output
            errorOutput = output
            ignoreExitValue = true
        }

        def text = output.toString('UTF-8')
        if (result.exitValue == 0) {
            throw new GradleException('Expected verifyAotBootstrapSafety negative fixture to fail, but it passed.')
        }
        if (!text.contains('bad_top_level_registry.clj')) {
            throw new GradleException('Negative fixture failure did not include file path details. Output:\n' + text)
        }
        if (!text.contains('symbol=Blocks/STONE')) {
            throw new GradleException('Negative fixture failure did not include detected symbol details. Output:\n' + text)
        }

        logger.lifecycle('[verifyAotBootstrapSafetyNegativeFixture] passed. intentional violation was detected with file+symbol diagnostics.')
    }
}

