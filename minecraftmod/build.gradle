        [name: 'clojure.lang.Reflector', pattern: ~/clojure\.lang\.Reflector/],
        [name: 'bare Reflector/', pattern: ~/(?<![\w.-])Reflector\//],
        [name: 'java.lang.reflect import', pattern: ~/\[java\.lang\.reflect/],
        [name: '.getMethod', pattern: ~/\.getMethod\b/],
        [name: '.getField', pattern: ~/\.getField\b/],
