tasks.register('verifyAotIronRules') {
    group = 'verification'
    description = 'Fail on AOT iron-rule violations: keyword-as-IFn, 3-arg into+transducer, ^:const collections.'

    def clojureMainSources = fileTree(project.rootDir) {
        include 'ac/src/main/**/*.clj'
        include 'mcmod/src/main/**/*.clj'
        include 'mc-1.20.1/src/main/**/*.clj'
