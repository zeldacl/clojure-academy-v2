plugins {
    // 统一管理插件版本，不在这里 apply
    id "dev.architectury.loom" version "1.13.467" apply false 
    id "dev.clojurephant.clojure" version "0.9.1" apply false
    id "com.github.johnrengelman.shadow" version "8.1.1" apply false
}

allprojects {
    group = rootProject.findProperty('mod_group')
    version = rootProject.findProperty('mod_version')

    repositories {
        mavenCentral()
        maven { url "https://maven.architectury.dev/" }
        maven { url "https://maven.fabricmc.net/" }    // 必须，Loom 的底层依赖在此
        maven { url "https://maven.minecraftforge.net" }
        maven { url "https://repo.clojars.org" }
        maven { 
            url = 'https://maven.blamejared.com'
            name = 'BlameJared Maven'
        }
    }
}

// 汇总任务依然保留，但在各个子模块 build 完成后触发
tasks.register('gatherJars', Copy) {
    into "$buildDir/distributions"
    subprojects { sp ->
        if (sp.name.startsWith("forge-")) {
            evaluationDependsOn(sp.path) // 确保子项目评估完成
            def remapTask = sp.tasks.findByName('remapJar')
            if (remapTask != null) {
                from remapTask.archiveFile
            }
        }
    }
}

subprojects {
    // clojurephant 0.9.1：checkClojure 在每个 namespace load 后用字符串 eval `(.flush *err*)`，
    // *err* 无类型提示 → 大量 NO_SOURCE_PATH 反射告警。由 buildSrc 替换为带 ^java.io.Writer 的 flush。
    local.ClojurephantFlushFix.configure(project)

    // 只有应用了 java 或 clojure 插件的子工程才添加此 Task
    plugins.withType(JavaPlugin) {
        tasks.register('printClasspath') {
            doLast {
                def classpathFiles = sourceSets.main.compileClasspath + 
                                     sourceSets.main.runtimeClasspath + 
                                     files(sourceSets.main.allSource.srcDirs)
                
                // 打印出该子工程的完整类路径
                println(classpathFiles.filter { it.exists() }.join(File.pathSeparator))
            }
        }
    }
}

tasks.register('unitTestCompile') {
    group = 'verification'
    description = 'Compile unit test namespaces for platform-neutral modules.'
    dependsOn ':mcmod:compileTestClojure', ':ac:compileTestClojure'
}

tasks.register('runAcUnitTests') {
    group = 'verification'
    description = 'Execute ac Clojure unit tests (clojure.test).'
    dependsOn ':ac:runAcClojureTests'
}

tasks.register('runMcmodUnitTests') {
    group = 'verification'
    description = 'Execute mcmod Clojure unit tests (clojure.test).'
    dependsOn ':mcmod:runMcmodClojureTests'
}

tasks.register('verifyArchitectureBoundaries') {
    group = 'verification'
    description = 'Verify architecture boundaries: ac/mcmod must not reference Minecraft or loader APIs.'

    doLast {
        def sourceIncludes = [
            '**/*.clj',
            '**/*.cljc',
            '**/*.cljs',
            '**/*.java',
            '**/*.kt',
            '**/*.kts',
            '**/*.groovy'
        ]

        def violations = []

        def isSkippableLine = { String line ->
            def trimmed = line.trim()
            return trimmed.isEmpty() ||
                trimmed.startsWith(';') ||
                trimmed.startsWith('//') ||
                trimmed.startsWith('/*') ||
                trimmed.startsWith('*/') ||
                trimmed.startsWith('*') ||
                trimmed.startsWith('#') ||
                trimmed.startsWith('"') ||
                trimmed.startsWith('\'') ||
                trimmed.startsWith('`')
        }

            def isLikelyCodeLine = { String line ->
                def trimmed = line.trim()
                if (trimmed.isEmpty()) {
                    return false
                }
                def first = trimmed.charAt(0)
                return trimmed.startsWith('import ') ||
                trimmed.startsWith('package ') ||
                trimmed.startsWith('(ns ') ||
                trimmed.startsWith('(:require') ||
                trimmed.startsWith('(:import') ||
                    trimmed.endsWith(';') ||
                    ['(', '[', '{', ':', '^', '@'].contains(String.valueOf(first))
            }

        def checkPattern = { String ruleName, FileTree tree, def pattern, Closure<Boolean> shouldCheckLine ->
            tree.files.each { File file ->
                def rel = project.rootDir.toPath().relativize(file.toPath()).toString().replace('\\', '/')
                file.readLines('UTF-8').eachWithIndex { String line, int idx ->
                    if (shouldCheckLine(line) && pattern.matcher(line).find()) {
                        violations << [
                            rule   : ruleName,
                            file   : rel,
                            lineNo : idx + 1,
                            text   : line.trim()
                        ]
                    }
                }
            }
        }

        def acSource = fileTree('ac/src') {
            include sourceIncludes
            exclude '**/build/**', '**/.gradle/**'
        }
        def mcmodSource = fileTree('mcmod/src') {
            include sourceIncludes
            exclude '**/build/**', '**/.gradle/**'
        }

        checkPattern(
            'AC_MCMOD_NO_MINECRAFT_OR_FORGE',
            acSource + mcmodSource,
            ~/(net\.minecraft(?!\.client)|net\.minecraftforge)/,
            { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
        )

        checkPattern(
            'AC_NO_PLATFORM_NS_DEPENDENCY',
            acSource,
            ~/(cn\.li\.(forge|fabric)\d*)/,
            { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
        )

        checkPattern(
            'NON_CLIENT_NO_MC_CLIENT_IMPORT',
            acSource + mcmodSource,
            ~/net\.minecraft\.client/,
            { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
        )

        def nonClientViolations = violations.findAll {
            it.rule == 'NON_CLIENT_NO_MC_CLIENT_IMPORT' &&
                !(it.file.contains('/client/') || it.file.contains('\\client\\'))
        }
        violations.removeAll { it.rule == 'NON_CLIENT_NO_MC_CLIENT_IMPORT' }
        violations.addAll(nonClientViolations)

        if (!violations.isEmpty()) {
            logger.error('Architecture boundary violations found ({}):', violations.size())
            violations.each { v ->
                logger.error('  [{}] {}:{} -> {}', v.rule, v.file, v.lineNo, v.text)
            }
            throw new GradleException('verifyArchitectureBoundaries failed. See violations above.')
        }

        logger.lifecycle('[verifyArchitectureBoundaries] passed. No boundary violations detected.')
    }
}

tasks.register('verifyForgeBaseline') {
    group = 'verification'
    description = 'Compile baseline Clojure sources for ac, mcmod, and forge-1.20.1.'
    dependsOn 'verifyArchitectureBoundaries', ':ac:compileClojure', ':mcmod:compileClojure', ':forge-1.20.1:compileClojure'
}

tasks.register('verifyFabricBaseline') {
    group = 'verification'
    description = 'Compile baseline sources for fabric-1.20.1 (minimal-maintenance gate).'
    dependsOn 'verifyArchitectureBoundaries', ':fabric-1.20.1:compileJava', ':fabric-1.20.1:compileClojure'
}

tasks.register('verifyCurrentPlatforms') {
    group = 'verification'
    description = 'Run compile-level verification matrix for current maintained platforms (Forge + Fabric).'
    dependsOn 'verifyForgeBaseline', 'verifyFabricBaseline'
}

def registerForgeGameTestTask = {
    def forgeProject = project(':forge-1.20.1')
    def candidates = [
        'runGameTestServer',
        'runGametestServer',
        'gameTestServer',
        'runGameTests',
        'runGametests'
    ]
    def gameTestTasks = forgeProject.tasks.matching { candidates.contains(it.name) }

    tasks.register('runForgeGameTests') {
        group = 'verification'
        description = 'Run Forge GameTest server using official task exit code.'
        dependsOn 'unitTestCompile', ':forge-1.20.1:compileClojure'
        if (!gameTestTasks.isEmpty()) {
            dependsOn gameTestTasks
        }

        onlyIf {
            if (gameTestTasks.isEmpty()) {
                logger.lifecycle('[runForgeGameTests] skipped. No Forge GameTest task found. Checked: {}', candidates.join(', '))
                return false
            }
            logger.lifecycle('[runForgeGameTests] using task(s): {}', gameTestTasks.collect { it.path }.join(', '))
            return true
        }

        doFirst {
            def isWindows = org.gradle.internal.os.OperatingSystem.current().isWindows()
            def runGameTestDir = file('forge-1.20.1/run-gametest')
            def legacyRunDir = file('forge-1.20.1/run')
            def lockFile = file('forge-1.20.1/run-gametest/world/session.lock')
            def serverProperties = file('forge-1.20.1/run-gametest/server.properties')
            def legacyServerProperties = file('forge-1.20.1/run/server.properties')

            if (lockFile.exists()) {
                if (!lockFile.delete()) {
                    throw new GradleException("Forge GameTest world lock is held: ${lockFile}. Stop stale runGameTestServer processes and retry.")
                }
                logger.lifecycle('[runForgeGameTests] removed stale world lock: {}', lockFile)
            }
            if (!runGameTestDir.exists()) {
                runGameTestDir.mkdirs()
            }
            if (!legacyRunDir.exists()) {
                legacyRunDir.mkdirs()
            }
            // Avoid local dedicated-server conflicts in CI/dev machines.
            serverProperties.text = "server-port=0${System.lineSeparator()}online-mode=false${System.lineSeparator()}"
            legacyServerProperties.text = "server-port=0${System.lineSeparator()}online-mode=false${System.lineSeparator()}"

            if (isWindows) {
                try {
                    def portProbe = ['cmd', '/c', 'netstat -ano | findstr ":25565"']
                        .execute()
                    portProbe.waitFor()
                    def listeners = portProbe.in.text.readLines()
                        .findAll { it.contains('LISTENING') }
                    listeners.each { line ->
                        def parts = line.trim().split(/\s+/)
                        def pid = parts ? parts[-1] : null
                        if (pid?.isInteger()) {
                            logger.lifecycle('[runForgeGameTests] killing stale listener on 25565, pid={}', pid)
                            ['cmd', '/c', "taskkill /PID ${pid} /F"].execute().waitFor()
                        }
                    }
                } catch (Exception e) {
                    logger.lifecycle('[runForgeGameTests] failed to pre-clean 25565 listener: {}', e.message)
                }
            }
        }
    }
}

registerForgeGameTestTask()

tasks.register('validateForgeGameTestLog') {
    group = 'verification'
    description = 'Fail verification when Forge GameTest run log contains known fatal startup/runtime errors.'
    dependsOn 'runForgeGameTests'

    doLast {
        def logFile = file('forge-1.20.1/run-gametest/logs/latest.log')
        if (!logFile.exists()) {
            throw new GradleException("Forge GameTest log not found: ${logFile}")
        }
        def gameTestJava = file('forge-1.20.1/src/main/java/cn/li/forge1201/gametest/ForgeSmokeGameTests.java')
        def batchReport = file('build/reports/forge-gametest-batch-report.txt')

        def logText = logFile.getText('UTF-8')
        def requiredMarkerGroups = [
            ['Starting minecraft server version', 'Started game test server'],
            ['Loading properties', 'Preparing start region for dimension']
        ]
        def fatalPatterns = [
            'Failed to load Clojure mod implementation',
            'RuntimeDistCleaner',
            'Failed to load registries due to above errors',
            'Unknown registry key in ResourceKey[minecraft:root / minecraft:worldgen/feature]',
            'Failed to parse my_mod:worldgen/configured_feature/phase_liquid_pool.json',
            'Failed to start the minecraft server',
            'The process cannot access the file because another process has locked a portion of the file'
        ]

        def missingMarkerGroups = requiredMarkerGroups.findAll { group ->
            !group.any { marker -> logText.contains(marker) }
        }
        if (!missingMarkerGroups.isEmpty()) {
            def display = missingMarkerGroups.collect { it.join(' | ') }
            throw new GradleException("Forge GameTest log is missing expected startup marker groups: ${display}")
        }

        def matchedFatalPatterns = fatalPatterns.findAll { logText.contains(it) }
        if (!matchedFatalPatterns.isEmpty()) {
            throw new GradleException("Forge GameTest log contains fatal errors: ${matchedFatalPatterns}")
        }

        // Build a per-batch report from declared @GameTest methods.
        // This keeps verification output actionable even when Forge server lifecycle
        // does not auto-exit with explicit per-test summaries.
        def batchByMethod = [:]
        if (gameTestJava.exists()) {
            def src = gameTestJava.getText('UTF-8')
            def matcher = (src =~ /@GameTest\([^)]*batch\s*=\s*"([^"]+)"[^)]*\)\s*public\s+static\s+void\s+([A-Za-z0-9_]+)\s*\(/)
            matcher.each { m ->
                batchByMethod[m[2]] = m[1]
            }
        }

        def statusByBatch = [:].withDefault { [passed: 0, failed: 0, notObserved: 0] }
        batchByMethod.each { methodName, batch ->
            def lower = logText.toLowerCase(Locale.ROOT)
            def methodLower = methodName.toLowerCase(Locale.ROOT)
            def passed = (lower.contains(methodLower) && (lower.contains('passed') || lower.contains('succeeded')))
            def failed = (lower.contains(methodLower) && (lower.contains('failed') || lower.contains('error')))
            if (failed) {
                statusByBatch[batch].failed++
            } else if (passed) {
                statusByBatch[batch].passed++
            } else {
                statusByBatch[batch].notObserved++
            }
        }

        batchReport.parentFile.mkdirs()
        def lines = []
        lines << "Forge GameTest Batch Report"
        lines << "log=${logFile}"
        lines << "timestamp=${new Date().format('yyyy-MM-dd HH:mm:ss')}"
        lines << ""
        if (statusByBatch.isEmpty()) {
            lines << "No @GameTest methods were discovered in ForgeSmokeGameTests.java"
        } else {
            statusByBatch.keySet().sort().each { batch ->
                def row = statusByBatch[batch]
                def overall = row.failed > 0 ? 'FAILED' : (row.passed > 0 ? 'PASSED' : 'NOT_OBSERVED')
                lines << String.format(Locale.ROOT,
                    "batch=%s overall=%s passed=%d failed=%d not_observed=%d",
                    batch, overall, row.passed, row.failed, row.notObserved)
            }
        }
        batchReport.setText(lines.join(System.lineSeparator()) + System.lineSeparator(), 'UTF-8')
        logger.lifecycle('[validateForgeGameTestLog] wrote batch report: {}', batchReport)
    }
}

tasks.register('verifyForgeTesting') {
    group = 'verification'
    description = 'Run unit test compilation and Forge GameTest verification for current scope.'
    dependsOn 'verifyArchitectureBoundaries', 'verifyForgeBaseline', 'unitTestCompile', 'runAcUnitTests', 'runMcmodUnitTests', 'runForgeGameTests', 'validateForgeGameTestLog'
}






