def extractMapBody = { String text, String mapName ->
    def matcher = (text =~ /(?s)def\s+\^:private\s+${mapName}\s*\{(.*?)\}/)
    matcher.find() ? matcher.group(1) : null
}

def extractKeywordSet = { String mapBody ->
    if (mapBody == null) {
        return [] as Set
    }
    def matcher = (mapBody =~ /:([a-zA-Z0-9\-]+)/)
    def out = [] as Set
    matcher.each { out << it[1] }
    out
}

tasks.register('verifyForgeHookCoverage') {
    group = 'verification'
    description = 'Verify hook implementation keys cover shared hook catalog declarations (Phase C: mc1201 is shared source).'

    doLast {
        def hookCatalog = file('mcmod/src/main/clojure/cn/li/mcmod/entity/hook_catalog.clj')
        // Phase C: Hooks moved from Forge to shared mc1201 layer (Phase A deleted forge1201 wrappers)
        def sharedEffectHooks = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/entity/effect_hooks.clj')
        def sharedRayHooks = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/entity/ray_hooks.clj')

        [hookCatalog, sharedEffectHooks, sharedRayHooks].each { f ->
            if (!f.exists()) {
                throw new GradleException("Required hook coverage file not found: ${f}")
            }
        }

        def catalogText = hookCatalog.getText('UTF-8')
        def sharedEffectText = sharedEffectHooks.getText('UTF-8')
        def sharedRayText = sharedRayHooks.getText('UTF-8')

        def effectCatalogImpls = extractKeywordSet(extractMapBody(catalogText, 'effect-hook->impl-key'))
        def rayCatalogImpls = extractKeywordSet(extractMapBody(catalogText, 'ray-hook->impl-key'))
        def sharedEffectImpls = extractKeywordSet(extractMapBody(sharedEffectText, 'impl-key->hook-class'))
        def sharedRayImpls = extractKeywordSet(extractMapBody(sharedRayText, 'impl-key->hook-class'))

        def missingEffect = (effectCatalogImpls - sharedEffectImpls)
        def missingRay = (rayCatalogImpls - sharedRayImpls)

        if (!missingEffect.isEmpty() || !missingRay.isEmpty()) {
            throw new GradleException("Hook coverage missing impl keys in mc1201 (Phase C shared layer). effect=${missingEffect} ray=${missingRay}")
        }

        logger.lifecycle('[verifyForgeHookCoverage] passed (mc1201 shared). effect={} ray={}', effectCatalogImpls.size(), rayCatalogImpls.size())
    }
}

tasks.register('verifyFabricHookManifest') {
    group = 'verification'
    description = 'Verify Fabric unsupported hook manifest explicitly tracks shared hook catalog declarations.'

    doLast {
        def hookCatalog = file('mcmod/src/main/clojure/cn/li/mcmod/entity/hook_catalog.clj')
        def manifestFile = file('docs/dev/fabric-hook-support.properties')

        [hookCatalog, manifestFile].each { f ->
            if (!f.exists()) {
                throw new GradleException("Required Fabric hook manifest file not found: ${f}")
            }
        }

        def catalogText = hookCatalog.getText('UTF-8')
        def effectCatalogImpls = extractKeywordSet(extractMapBody(catalogText, 'effect-hook->impl-key'))
        def rayCatalogImpls = extractKeywordSet(extractMapBody(catalogText, 'ray-hook->impl-key'))

        def props = new Properties()
        manifestFile.withInputStream { props.load(it) }

        def unsupportedEffects = ((props.getProperty('unsupported.effect.impl.keys') ?: '')
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() }) as Set
        def unsupportedRays = ((props.getProperty('unsupported.ray.impl.keys') ?: '')
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() }) as Set
        def supportedEffects = ((props.getProperty('supported.effect.impl.keys') ?: '')
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() }) as Set
        def supportedRays = ((props.getProperty('supported.ray.impl.keys') ?: '')
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() }) as Set

        def declaredEffects = unsupportedEffects + supportedEffects
        def declaredRays = unsupportedRays + supportedRays

        def missingEffectDecl = (effectCatalogImpls - declaredEffects)
        def missingRayDecl = (rayCatalogImpls - declaredRays)

        if (!missingEffectDecl.isEmpty() || !missingRayDecl.isEmpty()) {
            throw new GradleException("Fabric hook manifest missing impl keys. effect=${missingEffectDecl} ray=${missingRayDecl}")
        }

        logger.lifecycle('[verifyFabricHookManifest] passed. supported effect={} ray={}, unsupported effect={} ray={}',
            supportedEffects.size(), supportedRays.size(), unsupportedEffects.size(), unsupportedRays.size())
    }
}

tasks.register('verifyPlatformHookCoverage') {
    group = 'verification'
    description = 'Verify hook coverage/contracts between shared catalog and platform layers.'
    dependsOn 'verifyForgeHookCoverage', 'verifyFabricHookManifest'
}

tasks.register('verifyPlatformNoBusinessHookIds') {
    group = 'verification'
    description = 'Verify platform hook adapters do not hardcode business hook-id literals (Phase C: mc1201 is shared).'

    doLast {
        def contentFile = file('ac/src/main/clojure/cn/li/ac/content/entities/all.clj')
        // Phase C: Forge/Fabric platform hooks have been removed; mc1201 shared layer handles mapping
        // This verifier now ensures no remaining platform adapter files hardcode business IDs
        
        if (!contentFile.exists()) {
            throw new GradleException("Required platform no-business-id check file not found: ${contentFile}")
        }

        def hookIdMatcher = (contentFile.getText('UTF-8') =~ /:hook\s+:([a-zA-Z0-9\-]+)/)
        def businessHookIds = [] as Set
        hookIdMatcher.each { businessHookIds << it[1] }

        // Collect remaining platform adapter files (non-entity layer, which handles event binding)
        def forgeIntegrationEvents = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/integration/events.clj')
        def fabricIntegrationEvents = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/integration/events.clj')
        
        def platformAdapterFiles = [forgeIntegrationEvents, fabricIntegrationEvents].findAll { it.exists() }
        
        def leakedHookIds = [] as Set
        platformAdapterFiles.each { adapterFile ->
            def adapterText = adapterFile.getText('UTF-8')
            businessHookIds.each { hookId ->
                if (adapterText.contains("\"${hookId}\"")) {
                    leakedHookIds << hookId
                }
            }
        }

        if (!leakedHookIds.isEmpty()) {
            throw new GradleException("Platform adapter contains leaked business hook-id literals: ${leakedHookIds}")
        }

        logger.lifecycle('[verifyPlatformNoBusinessHookIds] passed (Phase C mc1201 shared). scanned business hook ids={}', businessHookIds.size())
    }
}

tasks.register('verifyAcPlayerUuidSsoT') {
    group = 'verification'
    description = 'Verify AC code uses cn.li.ac.ability.util.uuid/player-uuid as the player UUID SSOT.'

    doLast {
        def allowedFiles = [
            'ac/src/main/clojure/cn/li/ac/ability/util/uuid.clj'
        ] as Set
        def violations = []
        def matcher = ~/entity\/player-get-uuid/

        fileTree('ac/src/main/clojure') {
            include '**/*.clj'
            exclude '**/build/**', '**/.gradle/**'
        }.files.each { File f ->
            def rel = project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')
            if (!allowedFiles.contains(rel)) {
                f.readLines('UTF-8').eachWithIndex { String line, int idx ->
                    def trimmed = line.trim()
                    if (!trimmed.startsWith(';') && matcher.matcher(line).find()) {
                        violations << "${rel}:${idx + 1}: ${trimmed}"
                    }
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Direct player UUID access found outside UUID SSOT:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyAcPlayerUuidSsoT] passed. Direct player UUID access is confined to ability.util.uuid.')
    }
}

tasks.register('verifyGameplayConfigContractSsoT') {
    group = 'verification'
    description = 'Verify gameplay config provider-map construction and removed keys stay centralized.'

    doLast {
        def forgeFile = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/config/game_config.clj')
        def fabricFile = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/config/gameplay_bridge.clj')
        def acFile = file('ac/src/main/clojure/cn/li/ac/config/gameplay.clj')
        def forgeJavaFile = file('forge-1.20.1/src/main/java/cn/li/forge1201/config/GameplayConfig.java')
        def requiredFiles = [forgeFile, fabricFile, acFile, forgeJavaFile]

        requiredFiles.each { File f ->
            if (!f.exists()) {
                throw new GradleException("Required gameplay config contract file not found: ${f}")
            }
        }

        def acText = acFile.getText('UTF-8')
        if (!acText.contains('(def provider-keys') || !acText.contains('(defn make-provider-map') || !acText.contains('(defn install-config-bridge!')) {
            throw new GradleException('AC gameplay config contract must define provider-keys, make-provider-map, and install-config-bridge!.')
        }

        [forgeFile, fabricFile].each { File f ->
            def text = f.getText('UTF-8')
            if (!text.contains('gameplay/make-provider-map')) {
                throw new GradleException("Platform gameplay provider must delegate provider-map construction to gameplay/make-provider-map: ${f}")
            }
        }

        def forbiddenTokens = [
            ':analysis-enabled?', ':gen-ores?', ':gen-phase-liquid?', ':heads-or-tails?',
            'analysis-enabled', 'gen-ores', 'gen-phase-liquid', 'heads-or-tails',
            'ANALYSIS_ENABLED', 'GEN_ORES', 'GEN_PHASE_LIQUID', 'HEADS_OR_TAILS',
            'genOres', 'genPhaseLiquid', 'headsOrTails'
        ]
        def violations = []
        requiredFiles.each { File f ->
            def rel = project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')
            def text = f.getText('UTF-8')
            forbiddenTokens.each { token ->
                if (text.contains(token)) {
                    violations << "${rel}: ${token}"
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Removed gameplay config keys resurfaced:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyGameplayConfigContractSsoT] passed. Platform providers delegate to shared contract and removed keys stay absent.')
    }
}

