tasks.register('verifyPlatformNoBusinessHookIds') {
    group = 'verification'
    description = 'Verify platform hook adapters do not hardcode business hook-id literals (Phase C: mc1201 is shared).'

    doLast {
        def contentFile = file('ac/src/main/clojure/cn/li/ac/content/entities/all.clj')
        // Phase C: Forge/Fabric platform hooks have been removed; mc1201 shared layer handles mapping
        // This verifier now ensures no remaining platform adapter files hardcode business IDs
        
        if (!contentFile.exists()) {
            throw new GradleException("Required platform no-business-id check file not found: ${contentFile}")
        }

        def hookIdMatcher = (contentFile.getText('UTF-8') =~ /:hook\s+:([a-zA-Z0-9\-]+)/)
        def businessHookIds = [] as Set
        hookIdMatcher.each { businessHookIds << it[1] }

        // Collect remaining platform adapter files (non-entity layer, which handles event binding)
        def forgeIntegrationEvents = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/integration/events.clj')
        def fabricIntegrationEvents = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/integration/events.clj')
        
        def platformAdapterFiles = [forgeIntegrationEvents, fabricIntegrationEvents].findAll { it.exists() }
        
        def leakedHookIds = [] as Set
        platformAdapterFiles.each { adapterFile ->
            def adapterText = adapterFile.getText('UTF-8')
            businessHookIds.each { hookId ->
                if (adapterText.contains("\"${hookId}\"")) {
                    leakedHookIds << hookId
                }
            }
        }

        if (!leakedHookIds.isEmpty()) {
            throw new GradleException("Platform adapter contains leaked business hook-id literals: ${leakedHookIds}")
        }

        logger.lifecycle('[verifyPlatformNoBusinessHookIds] passed (Phase C mc1201 shared). scanned business hook ids={}', businessHookIds.size())
    }
}

tasks.register('verifyPlatformNoAcSourceInjection') {
    group = 'verification'
    description = 'Verify Forge/Fabric sourceSets do not physically inject AC sources or resources.'

    doLast {
        def acPath = project(':ac').projectDir.canonicalFile.toPath()
        def platformProjects = [project(':forge-1.20.1'), project(':fabric-1.20.1')]
        def violations = []

        platformProjects.each { Project p ->
            def sourceSet = p.sourceSets.main
            def roots = [] as Set
            roots.addAll(sourceSet.java.srcDirs)
            roots.addAll(sourceSet.resources.srcDirs)
            if (sourceSet.hasProperty('clojure')) {
                roots.addAll(sourceSet.clojure.srcDirs)
            }
            roots.findAll { it != null && it.exists() }.each { File root ->
                def rootPath = root.canonicalFile.toPath()
                if (rootPath.startsWith(acPath)) {
                    violations << "${p.path}: ${rootPath}"
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Platform sourceSets must not inject AC source/resource roots:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyPlatformNoAcSourceInjection] passed. Platform sourceSets do not inject AC roots.')
    }
}

tasks.register('verifyDeletedCompatibilityResidues') {
    group = 'verification'
    description = 'Verify deleted legacy compatibility files/tokens do not return.'

    doLast {
        def deletedFiles = [
            file('forge-1.20.1/src/main/java/cn/li/forge1201/event/ForgeMissingMappingHandler.java'),
            file('forge-1.20.1/src/main/clojure/cn/li/forge1201/integration/events.clj'),
            file('mc-1.20.1/src/main/clojure/cn/li/mc1201/runtime/spi_contracts.clj'),
            file('ac/src/main/clojure/cn/li/ac/block/gui/registration.clj'),
            file('ac/src/main/clojure/cn/li/ac/gui/platform_adapter/metadata_api.clj'),
            file('ac/src/main/clojure/cn/li/ac/gui/platform_adapter/registry_api.clj'),
            file('ac/src/main/clojure/cn/li/ac/wireless/gui/protocol.clj'),
            file('ac/src/main/clojure/cn/li/ac/wireless/gui/state/sync.clj'),
            file('ac/src/main/clojure/cn/li/ac/wireless/gui/events/bus.clj'),
            file('ac/src/main/clojure/cn/li/ac/wireless/gui/events/handlers.clj'),
            file('ac/src/main/clojure/cn/li/ac/wireless/gui/component/tabs.clj'),
            file('ac/src/main/clojure/cn/li/ac/testing/fixtures.clj'),
            file('ac/src/main/clojure/cn/li/ac/testing/mocks.clj')
        ]
        def violations = []
        deletedFiles.each { File f ->
            if (f.exists()) {
                violations << "deleted compatibility file returned: ${project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')}"
            }
        }

        def forbiddenTokens = [
            'ForgeMissingMappingHandler',
            'ignoreLegacyConverters',
            'runtime.spi-contracts',
            'spi_contracts',
            'compatibility facade',
            'minimal bridge for migration',
            'Compile-unblocking stub'
        ]
        fileTree(project.rootDir) {
            include 'mc-1.20.1/src/main/**/*.clj', 'mc-1.20.1/src/main/**/*.java'
            include 'forge-1.20.1/src/main/**/*.clj', 'forge-1.20.1/src/main/**/*.java'
            include 'fabric-1.20.1/src/main/**/*.clj', 'fabric-1.20.1/src/main/**/*.java'
            exclude '**/build/**', '**/.gradle/**'
        }.files.each { File f ->
            def text = f.getText('UTF-8')
            forbiddenTokens.each { token ->
                if (text.contains(token)) {
                    violations << "${project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')}: ${token}"
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Deleted compatibility residue guard failed:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyDeletedCompatibilityResidues] passed. Deleted compatibility residues stay absent.')
    }
}

tasks.register('verifyAcPlayerUuidSsoT') {
    group = 'verification'
    description = 'Verify AC code uses cn.li.ac.ability.util.uuid/player-uuid as the player UUID SSOT.'

    doLast {
        def allowedFiles = [
            'ac/src/main/clojure/cn/li/ac/ability/util/uuid.clj'
        ] as Set
        def violations = []
        def matcher = ~/entity\/player-get-uuid/

        fileTree('ac/src/main/clojure') {
            include '**/*.clj'
            exclude '**/build/**', '**/.gradle/**'
        }.files.each { File f ->
            def rel = project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')
            if (!allowedFiles.contains(rel)) {
                f.readLines('UTF-8').eachWithIndex { String line, int idx ->
                    def trimmed = line.trim()
                    if (!trimmed.startsWith(';') && matcher.matcher(line).find()) {
                        violations << "${rel}:${idx + 1}: ${trimmed}"
                    }
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Direct player UUID access found outside UUID SSOT:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyAcPlayerUuidSsoT] passed. Direct player UUID access is confined to ability.util.uuid.')
    }
}

tasks.register('verifyGameplayConfigContractSsoT') {
    group = 'verification'
    description = 'Verify gameplay config descriptors are owned by AC and platform gameplay bridges stay deleted.'

    doLast {
        def acFile = file('ac/src/main/clojure/cn/li/ac/config/gameplay.clj')
