tasks.register('verifyGuiNetworkTransportBoundaries') {
    group = 'verification'
    description = 'Verify GUI network envelope/codec and registry open payloads stay shared, with thin platform transports.'

    doLast {
        def sharedPacket = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/gui/network/packet.clj')
        def sharedRegistryCommon = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/gui/registry/common.clj')
        def deletedTopLevelPacket = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/gui/network_packet_base.clj')
        def forgeNetwork = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/gui/network.clj')
        def fabricSharedNetwork = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/gui/network/shared.clj')
        def fabricServerNetwork = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/gui/network/server.clj')
        def fabricClientNetwork = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/gui/network/client.clj')
        def forgeGuiRegistry = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/adapter/gui_registry.clj')
        def fabricGuiRegistry = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/adapter/gui_registry.clj')
        def fabricProviderBridge = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/gui/provider_bridge.clj')
        def violations = []

        if (deletedTopLevelPacket.exists()) {
            violations << 'Top-level GUI network packet namespace must stay deleted; use cn.li.mc1201.gui.network.packet'
        }

        [sharedPacket, sharedRegistryCommon, forgeNetwork, fabricSharedNetwork, fabricServerNetwork, fabricClientNetwork, forgeGuiRegistry, fabricGuiRegistry, fabricProviderBridge].each { File f ->
            if (!f.exists()) {
                violations << "Required GUI network file missing: ${project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')}"
            }
        }

        if (sharedPacket.exists()) {
            def sharedText = sharedPacket.getText('UTF-8')
            ['request-map', 'response-map', 'push-map', 'normalize-request', 'normalize-response', 'dispatch-client-response!', 'encode-payload-bytes', 'decode-payload-bytes'].each { token ->
                if (!sharedText.contains("defn ${token}")) {
                    violations << "gui/network/packet.clj must define shared GUI network ${token}"
                }
            }
        }

        if (sharedRegistryCommon.exists()) {
            def commonText = sharedRegistryCommon.getText('UTF-8')
            ['read-block-pos', 'write-block-pos!', 'read-extended-open-payload', 'write-extended-open-payload!', 'create-client-menu!'].each { token ->
                if (!commonText.contains("defn ${token}")) {
                    violations << "gui/registry/common.clj must define shared GUI registry helper ${token}"
                }
            }
        }

        if (forgeNetwork.exists()) {
            def forgeText = forgeNetwork.getText('UTF-8')
            if (forgeText.contains('cn.li.mc1201.gui.network-packet-base')) {
                violations << 'forge1201.gui.network must require cn.li.mc1201.gui.network.packet'
            }
            if ((forgeText =~ /(?s)\(:import.*?\[net\.minecraft\.client\s+Minecraft\]/).find()) {
                violations << 'forge1201.gui.network must not top-level import net.minecraft.client.Minecraft; resolve it lazily inside client-only response handling'
            }
            ['defn- serialize', 'defn- deserialize'].each { token ->
                if (forgeText.contains(token)) {
                    violations << "forge1201.gui.network must use shared packet-base codec directly, found ${token}"
                }
            }
        }

        if (forgeGuiRegistry.exists()) {
            def forgeRegistryText = forgeGuiRegistry.getText('UTF-8')
            if (!forgeRegistryText.contains('registry-common/create-client-menu!')) {
                violations << 'forge1201.adapter.gui-registry must delegate client menu construction to registry-common/create-client-menu!'
            }
            if (!forgeRegistryText.contains('registry-common/read-extended-open-payload')) {
                violations << 'forge1201.adapter.gui-registry must delegate extended open payload decode to registry-common/read-extended-open-payload'
            }
            ['registry-common/create-wrapped-container', '.readBlockPos'].each { token ->
                if (forgeRegistryText.contains(token)) {
                    violations << "forge1201.adapter.gui-registry must not inline shared GUI registry flow, found ${token}"
                }
            }
        }

        if (fabricSharedNetwork.exists()) {
            def fabricSharedText = fabricSharedNetwork.getText('UTF-8')
            ['packet-base/encode-payload', 'packet-base/decode-payload'].each { token ->
                if (!fabricSharedText.contains(token)) {
                    violations << "fabric1201.gui.network.shared must centralize GUI payload codec helpers: ${token}"
                }
            }
            ['ClientPlayNetworking', 'ServerPlayNetworking', 'net.minecraft.client.Minecraft'].each { token ->
                if (fabricSharedText.contains(token)) {
                    violations << "fabric1201.gui.network.shared must stay client/server neutral: ${token}"
                }
            }
        }

        if (fabricServerNetwork.exists()) {
            def fabricServerText = fabricServerNetwork.getText('UTF-8')
            ['packet-base/normalize-request', 'packet-base/response-map', 'packet-base/push-map'].each { token ->
                if (!fabricServerText.contains(token)) {
                    violations << "fabric1201.gui.network.server must use shared packet-base server envelope helper: ${token}"
                }
            }
            ['ClientPlayNetworking', 'net.minecraft.client.Minecraft'].each { token ->
                if (fabricServerText.contains(token)) {
                    violations << "fabric1201.gui.network.server must not depend on client transport/classes: ${token}"
                }
            }
        }

        if (fabricClientNetwork.exists()) {
            def fabricClientText = fabricClientNetwork.getText('UTF-8')
            ['packet-base/request-map', 'dispatch-client-response!'].each { token ->
                if (!fabricClientText.contains(token)) {
                    violations << "fabric1201.gui.network.client must own client request/response dispatch helper: ${token}"
                }
            }
            if (!fabricClientText.contains('net.fabricmc.fabric.api.client.networking.v1.ClientPlayNetworking')) {
                violations << 'fabric1201.gui.network.client must resolve ClientPlayNetworking from the client-only namespace'
            }
        }

        if (fabricGuiRegistry.exists()) {
            def fabricRegistryText = fabricGuiRegistry.getText('UTF-8')
            if (!fabricRegistryText.contains('registry-common/create-client-menu!')) {
                violations << 'fabric1201.adapter.gui-registry must delegate client menu construction to registry-common/create-client-menu!'
            }
            if (!fabricRegistryText.contains('registry-common/read-extended-open-payload')) {
                violations << 'fabric1201.adapter.gui-registry must delegate extended open payload decode to registry-common/read-extended-open-payload'
            }
            ['registry-common/create-wrapped-container', '.readInt', '.readBoolean', '.readBlockPos'].each { token ->
                if (fabricRegistryText.contains(token)) {
                    violations << "fabric1201.adapter.gui-registry must not inline shared GUI registry flow, found ${token}"
                }
            }
        }

        if (fabricProviderBridge.exists()) {
            def fabricProviderText = fabricProviderBridge.getText('UTF-8')
            if (!fabricProviderText.contains('registry-common/write-extended-open-payload!')) {
                violations << 'fabric1201.gui.provider-bridge must delegate extended open payload encode to registry-common/write-extended-open-payload!'
            }
            ['.writeInt', '.writeBoolean', '.writeBlockPos'].each { token ->
