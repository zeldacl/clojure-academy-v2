tasks.register('verifyPacketHandlerContext') {
    group = 'verification'
    description = 'Ensure platform packet handler entry points rebuild ThreadLocal context and enqueue to main thread.'

    def transportSources = fileTree(project.rootDir) {
        include 'forge-1.20.1/src/main/**/*.clj'
        include 'fabric-1.20.1/src/main/**/*.clj'
        include 'forge-1.20.1/src/main/**/*.java'
        exclude '**/build/**', '**/.gradle/**', '**/bin/**'
    }

    def contextWrapperPattern = ~/(?:with-client-ctx-fn|with-player-state-owner-fn|with-bound-client-owner|with-server-player-owner|with-client-response-owner)/
    def serverDispatchPattern = ~/net-server\/handle-request/
    def clientDispatchPattern = ~/packet-base\/dispatch-client-response!/
    def enqueueWorkPattern = ~/enqueueWork/

    def requiredChecklist = [
        [file: 'forge-1.20.1/src/main/clojure/cn/li/forge1201/gui/network.clj',
         mustContain: ['with-server-player-owner', 'with-client-response-owner', 'net-server/handle-request', 'packet-base/dispatch-client-response!']],
        [file: 'fabric-1.20.1/src/main/clojure/cn/li/fabric1201/gui/network/server.clj',
         mustContain: ['with-server-player-owner', '.execute server', 'net-server/handle-request']],
        [file: 'fabric-1.20.1/src/main/clojure/cn/li/fabric1201/gui/network/client.clj',
         mustContain: ['with-client-response-owner', '.execute client', 'packet-base/dispatch-client-response!']],
        [file: 'forge-1.20.1/src/main/java/cn/li/forge1201/network/ClojureNetworkPackets.java',
         mustContain: ['enqueueWork']]
    ]

    inputs.files(transportSources).withPropertyName('packetHandlerContextSources')
    outputs.dir(layout.buildDirectory.dir('verification/verifyPacketHandlerContext'))

    doLast {
        def violations = []

        requiredChecklist.each { spec ->
            def sourceFile = file(spec.file)
            if (!sourceFile.exists()) {
                violations << [file: spec.file, line: 0, rule: 'missing-checklist-file', text: 'required packet handler file not found']
                return
            }
            def text = sourceFile.getText('UTF-8')
            spec.mustContain.each { fragment ->
                if (!text.contains(fragment)) {
                    violations << [file: spec.file, line: 0, rule: 'checklist', text: "missing required fragment: ${fragment}"]
                }
            }
        }

        transportSources.files.findAll { it.isFile() && it.name.endsWith('.clj') }.sort { it.path }.each { File sourceFile ->
            def rel = project.rootDir.toPath().relativize(sourceFile.toPath()).toString().replace('\\', '/')
            def text = sourceFile.getText('UTF-8')
            def dispatchesServer = serverDispatchPattern.matcher(text).find()
            def dispatchesClient = clientDispatchPattern.matcher(text).find()
            if ((dispatchesServer || dispatchesClient) && !contextWrapperPattern.matcher(text).find()) {
                violations << [file: rel, line: 0, rule: 'missing-context-wrapper',
                               text: 'packet dispatch without with-client-ctx-fn / owner wrapper']
            }
        }

        def forgePackets = file('forge-1.20.1/src/main/java/cn/li/forge1201/network/ClojureNetworkPackets.java')
        if (forgePackets.exists()) {
            def packetsText = forgePackets.getText('UTF-8')
            def enqueueMatcher = enqueueWorkPattern.matcher(packetsText)
            def enqueueCount = 0
            while (enqueueMatcher.find()) {
                enqueueCount++
            }
            if (enqueueCount < 2) {
                violations << [file: 'forge-1.20.1/src/main/java/cn/li/forge1201/network/ClojureNetworkPackets.java',
                               line: 0, rule: 'enqueueWork', text: "expected >=2 enqueueWork calls, found ${enqueueCount}"]
            }
        }

        if (!violations.isEmpty()) {
            logger.error('[verifyPacketHandlerContext] {} violation(s):', violations.size())
            violations.each { v -> logger.error('  {}:{} [{}] {}', v.file, v.line, v.rule, v.text) }
            throw new GradleException('verifyPacketHandlerContext failed.')
        }
        def marker = layout.buildDirectory.file('verification/verifyPacketHandlerContext/passed.txt').get().asFile
        marker.parentFile.mkdirs()
        marker.setText("passed at ${new Date()}\n", 'UTF-8')
        logger.lifecycle('[verifyPacketHandlerContext] passed.')
    }
}

