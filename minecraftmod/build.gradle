tasks.register('verifyArchitectureBoundaries') {
    group = 'verification'
    description = 'Verify architecture boundaries across shared, Minecraft, and loader platform modules.'

    def sourceIncludes = [
        '**/*.clj',
        '**/*.cljc',
        '**/*.cljs',
        '**/*.java',
        '**/*.kt',
        '**/*.kts',
        '**/*.groovy'
    ]

    def makeSourceTree = { String relativeDir ->
        fileTree(relativeDir) {
            include sourceIncludes
            exclude '**/build/**', '**/.gradle/**'
        }
    }

    def acSource = makeSourceTree('ac/src')
    def mcmodSource = makeSourceTree('mcmod/src')
    def mc1201Source = makeSourceTree('mc-1.20.1/src')
    def forge1201MainSource = makeSourceTree('forge-1.20.1/src/main')
    def fabric1201MainSource = makeSourceTree('fabric-1.20.1/src/main')
    def passMarker = layout.buildDirectory.file('verification/verifyArchitectureBoundaries/passed.txt')

    inputs.files(acSource, mcmodSource, mc1201Source, forge1201MainSource, fabric1201MainSource)
        .withPropertyName('architectureBoundarySources')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    outputs.file(passMarker)

    doLast {
        def violations = []

        def isSkippableLine = { String line ->
            def trimmed = line.trim()
            return trimmed.isEmpty() ||
                trimmed.startsWith(';') ||
                trimmed.startsWith('//') ||
                trimmed.startsWith('/*') ||
                trimmed.startsWith('*/') ||
                trimmed.startsWith('*') ||
                trimmed.startsWith('#') ||
                trimmed.startsWith('"') ||
                trimmed.startsWith('\'') ||
                trimmed.startsWith('`')
        }

        def isLikelyCodeLine = { String line ->
            def trimmed = line.trim()
            if (trimmed.isEmpty()) {
                return false
            }
            def first = trimmed.charAt(0)
            return trimmed.startsWith('import ') ||
                trimmed.startsWith('package ') ||
                trimmed.startsWith('(ns ') ||
                trimmed.startsWith('(:require') ||
                trimmed.startsWith('(:import') ||
                trimmed.endsWith(';') ||
                ['(', '[', '{', ':', '^', '@'].contains(String.valueOf(first))
        }

        def ruleSpecs = [
            [
                rule: 'AC_MCMOD_NO_MINECRAFT_OR_FORGE',
                scopes: ['ac', 'mcmod'] as Set,
                pattern: ~/(net\.minecraft(?!\.client)|net\.minecraftforge)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'AC_NO_PLATFORM_NS_DEPENDENCY',
                scopes: ['ac'] as Set,
                pattern: ~/(cn\.li\.(forge|fabric)\d*)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'NON_CLIENT_NO_MC_CLIENT_IMPORT',
                scopes: ['ac', 'mcmod'] as Set,
                pattern: ~/net\.minecraft\.client/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'MC1201_NO_LOADER_IMPORT',
                scopes: ['mc1201'] as Set,
                pattern: ~/(net\.minecraftforge|net\.fabricmc|net\.neoforged|cn\.li\.(forge|fabric|neoforge))/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'MC1201_NO_AC_STATIC_DEPENDENCY',
                scopes: ['mc1201'] as Set,
                pattern: ~/cn\.li\.ac\./,
                shouldCheckLine: { String line -> !isSkippableLine(line) }
            ],
            [
                rule: 'FORGE1201_NO_FABRIC_API_OR_NS',
                scopes: ['forge1201'] as Set,
                pattern: ~/(net\.fabricmc|cn\.li\.fabric1201|ModInitializer)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'FABRIC1201_NO_FORGE_API_OR_NS',
                scopes: ['fabric1201'] as Set,
                pattern: ~/(net\.minecraftforge|cn\.li\.forge1201|@Mod\b)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'MIXIN_MUST_BE_JAVA',
                scopes: ['forge1201', 'fabric1201'] as Set,
                pattern: ~/^\(ns\s+cn\.li\.(?:forge|fabric)\d*\.mixin(?:\.|\b)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'PLATFORM_NO_AC_STATIC_OR_HARDCODED_DEPENDENCY',
                scopes: ['forge1201', 'fabric1201'] as Set,
                pattern: ~/cn\.li\.ac\./,
                shouldCheckLine: { String line -> !isSkippableLine(line) }
            ],
            [
                rule: 'NO_TOP_LEVEL_LIFECYCLE_OR_CONTENT_REGISTRATION',
                scopes: ['ac', 'mcmod', 'mc1201', 'forge1201', 'fabric1201'] as Set,
                pattern: ~/^\((?:lifecycle\/register-|server-context-spi\/register-server-context-impl!|discovery\/bootstrap-default-providers!|config-registry\/init-configs!|ability-runtime\/install-runtime-hooks!)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) }
            ],
            [
                rule: 'NO_TOP_LEVEL_ABILITY_RUNTIME_REGISTRATION',
                scopes: ['ac'] as Set,
                pattern: ~/^\((?:sk\/register-skill!|registry\/register-skill!|skill-registry\/register-skill!|item-actions\/register-|net-srv\/register-handler|damage-handler\/register-|passive\/register-|level-effects\/register-|hand-effects\/register-|fx-registry\/register-)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) }
            ]
        ]

        def markerFile = passMarker.get().asFile
        if (markerFile.exists()) {
            markerFile.delete()
        }

        def filesByRelativePath = new TreeMap<String, Map>()
        def addScopedFiles = { String scope, FileTree tree ->
            tree.files.each { File file ->
                def rel = project.rootDir.toPath().relativize(file.toPath()).toString().replace('\\', '/')
                def entry = filesByRelativePath[rel]
                if (entry == null) {
                    entry = [file: file, scopes: new LinkedHashSet<String>()]
                    filesByRelativePath[rel] = entry
                }
                entry.scopes.add(scope)
            }
        }

        addScopedFiles('ac', acSource)
        addScopedFiles('mcmod', mcmodSource)
        addScopedFiles('mc1201', mc1201Source)
        addScopedFiles('forge1201', forge1201MainSource)
        addScopedFiles('fabric1201', fabric1201MainSource)

        filesByRelativePath.each { String rel, Map entry ->
            def applicableRules = ruleSpecs.findAll { rule ->
                !java.util.Collections.disjoint(rule.scopes, entry.scopes)
            }
            if (applicableRules.isEmpty()) {
                return
            }

            entry.file.readLines('UTF-8').eachWithIndex { String line, int idx ->
                applicableRules.each { rule ->
                    if (rule.shouldCheckLine(line) && rule.pattern.matcher(line).find()) {
                        violations << [
                            rule   : rule.rule,
                            file   : rel,
                            lineNo : idx + 1,
                            text   : line.trim()
                        ]
                    }
                }
            }
        }

        def nonClientViolations = violations.findAll {
            it.rule == 'NON_CLIENT_NO_MC_CLIENT_IMPORT' &&
                !(it.file.contains('/client/') || it.file.contains('\\client\\'))
        }
        violations.removeAll { it.rule == 'NON_CLIENT_NO_MC_CLIENT_IMPORT' }
        violations.addAll(nonClientViolations)

        if (!violations.isEmpty()) {
            logger.error('Architecture boundary violations found ({}):', violations.size())
            violations.each { v ->
                logger.error('  [{}] {}:{} -> {}', v.rule, v.file, v.lineNo, v.text)
            }
            throw new GradleException('verifyArchitectureBoundaries failed. See violations above.')
        }

        markerFile.parentFile.mkdirs()
        markerFile.text = "passed files=${filesByRelativePath.size()} rules=${ruleSpecs.size()}${System.lineSeparator()}"
        logger.lifecycle('[verifyArchitectureBoundaries] passed. Scanned {} files with {} rules.', filesByRelativePath.size(), ruleSpecs.size())
    }
}

tasks.register('auditTopLevelMutableState') {
    group = 'verification'
    description = 'Report top-level Clojure mutable state defs and their migration classification.'

    def mutableStateSources = fileTree(project.rootDir) {
        include 'ac/src/main/clojure/**/*.clj'
        include 'mcmod/src/main/clojure/**/*.clj'
        include 'mc-1.20.1/src/main/clojure/**/*.clj'
        include 'forge-1.20.1/src/main/clojure/**/*.clj'
        include 'fabric-1.20.1/src/main/clojure/**/*.clj'
        exclude '**/build/**', '**/.gradle/**', '**/bin/**', '**/run/**', '**/run-data/**', '**/run-gametest/**'
    }
    def whitelistFile = file('docs/dev/top-level-mutable-state-whitelist.tsv')
    def reportFile = layout.buildDirectory.file('reports/top-level-state/audit.md')

    inputs.files(mutableStateSources)
        .withPropertyName('topLevelMutableStateSources')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    inputs.file(whitelistFile)
        .withPropertyName('topLevelMutableStateWhitelist')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    inputs.file(file('build.gradle'))
        .withPropertyName('topLevelMutableStateAuditImplementation')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    outputs.file(reportFile)
    outputs.cacheIf { true }

    doLast {
        def countParenDelta = { String line ->
            int delta = 0
            boolean inString = false
            boolean escaped = false
            for (int i = 0; i < line.length(); i++) {
                def ch = line.substring(i, i + 1)
                if (inString) {
                    if (escaped) {
                        escaped = false
                    } else if (ch == '\\') {
                        escaped = true
                    } else if (ch == '"') {
                        inString = false
                    }
                } else if (ch == ';') {
                    break
                } else if (ch == '"') {
                    inString = true
                } else if (ch == '(') {
                    delta++
                } else if (ch == ')') {
                    delta--
                }
            }
            delta
        }

        def parseDefHeader = { String formText ->
            def compact = formText.replaceAll(/[\r\n]+/, ' ').trim()
            def matcher = (compact =~ /^\((defonce|def)\s+(.*)$/)
            if (!matcher.find()) {
                return null
            }
            def rest = matcher.group(2).trim()
            while (rest.startsWith('^')) {
                if (rest.startsWith('^{')) {
                    int endIdx = rest.indexOf('}')
                    if (endIdx < 0) {
                        break
                    }
                    rest = rest.substring(endIdx + 1).trim()
                } else {
                    int spaceIdx = rest.indexOf(' ')
                    if (spaceIdx < 0) {
                        break
                    }
                    rest = rest.substring(spaceIdx + 1).trim()
                }
            }
            def symbolMatcher = (rest =~ /^([^\s\)]+)/)
            if (!symbolMatcher.find()) {
                return null
            }
            [defType: matcher.group(1), symbol: symbolMatcher.group(1)]
        }

        def mutableKinds = { String formText ->
            def kinds = [] as LinkedHashSet<String>
            if (formText.contains('atom-registry')) {
                kinds << 'atom-registry'
            }
            if (formText.contains('(atom') || formText.contains('(clojure.core/atom')) {
                kinds << 'atom'
            }
            if ((formText =~ /\(delay\b/).find()) {
                kinds << 'delay'
            }
            kinds as List
        }

        def nestedAtomCount = { String formText ->
            def matcher = (formText =~ /\((?:clojure\.core\/)?atom\b/)
            int count = 0
            matcher.each { count++ }
            Math.max(0, count - 1)
        }

        def fxUiRuntimeHintPath = { String path ->
            (path ==~ /^ac\/src\/main\/clojure\/cn\/li\/ac\/content\/ability\/.*_fx\.clj$/) ||
                (path ==~ /^ac\/src\/main\/clojure\/cn\/li\/ac\/ability\/client\/screens\/[^\/]+\.clj$/) ||
                (path ==~ /^mc-1\.20\.1\/src\/main\/clojure\/cn\/li\/mc1201\/client\/.*\.clj$/) ||
                (path ==~ /^mc-1\.20\.1\/src\/main\/clojure\/cn\/li\/mc1201\/gui\/cgui\/renderer\.clj$/)
        }

        def forbiddenRuntimePatternRules = [
            [pathPattern: ~/^mcmod\/src\/main\/clojure\/cn\/li\/mcmod\/network\/client\.clj$/,
             allowedSymbols: ['client-runtime'] as Set,
             reason     : 'Pilot 0: client network state must stay session-component owned.'],
            [pathPattern: ~/^ac\/src\/main\/clojure\/cn\/li\/ac\/ability\/client\/combat_notice\.clj$/,
             reason     : 'Pilot 1: combat notice state must stay UI-component owned.'],
            [pathPattern: ~/^mcmod\/src\/main\/clojure\/cn\/li\/mcmod\/gui\/container_state\.clj$/,
             reason     : 'Pilot 2: GUI container state must stay inside the installed GUI runtime component.'],
            [pathPattern: ~/^mcmod\/src\/main\/clojure\/cn\/li\/mcmod\/gui\/tabbed_gui\.clj$/,
             reason     : 'Pilot 2: tabbed GUI state must stay attached to the container runtime graph.']
        ]

        def whitelist = new LinkedHashMap<String, Map>()
        whitelistFile.readLines('UTF-8').eachWithIndex { String rawLine, int idx ->
            def line = rawLine.trim()
            if (line.isEmpty() || line.startsWith('#')) {
                return
            }
            def parts = rawLine.split('\t', -1) as List
            if (parts.size() < 5) {
                throw new GradleException("Malformed top-level mutable state whitelist line ${idx + 1}: ${rawLine}")
            }
            def key = "${parts[0]}\t${parts[1]}".toString()
            if (whitelist.containsKey(key)) {
                throw new GradleException("Duplicate top-level mutable state whitelist entry for ${parts[0]} ${parts[1]}")
            }
            whitelist[key] = [
                path          : parts[0],
                symbol        : parts[1],
                classification: parts[2],
                owner         : parts[3],
                notes         : parts.drop(4).join('\t')
            ]
        }

        def findings = []
        def processForm = { File sourceFile, String rel, int startLine, List<String> formLines ->
            def formText = formLines.join(System.lineSeparator())
            def kinds = mutableKinds(formText)
            if (kinds.isEmpty()) {
                return
            }
            def header = parseDefHeader(formText)
            if (header == null) {
                return
            }
            def key = "${rel}\t${header.symbol}".toString()
            def entry = whitelist[key]
            findings << [
                path          : rel,
                line          : startLine,
                symbol        : header.symbol,
                defType       : header.defType,
                kinds         : kinds,
                nestedAtomCount: nestedAtomCount(formText),
                classification: entry?.classification ?: 'UNCLASSIFIED',
                owner         : entry?.owner ?: '',
                notes         : entry?.notes ?: ''
            ]
        }

        def sourceFiles = mutableStateSources.files.sort { File a, File b -> a.path <=> b.path }
        sourceFiles.each { File sourceFile ->
            def rel = project.rootDir.toPath().relativize(sourceFile.toPath()).toString().replace('\\', '/')
            def lines = sourceFile.readLines('UTF-8')
            boolean capturing = false
            int depth = 0
            int startLine = 0
            def formLines = []
            lines.eachWithIndex { String line, int idx ->
                if (!capturing) {
                    def trimmed = line.trim()
                    if ((trimmed =~ /^\((defonce|def)\b/).find()) {
                        capturing = true
                        depth = countParenDelta(line)
                        startLine = idx + 1
                        formLines = [line]
                        if (depth <= 0) {
                            processForm(sourceFile, rel, startLine, formLines)
                            capturing = false
                            depth = 0
                            formLines = []
                        }
                    }
                } else {
                    formLines << line
                    depth += countParenDelta(line)
                    if (depth <= 0) {
                        processForm(sourceFile, rel, startLine, formLines)
                        capturing = false
                        depth = 0
                        formLines = []
                    }
                }
            }
        }

        def findingKeys = findings.collect { "${it.path}\t${it.symbol}".toString() } as Set
        def staleWhitelist = whitelist.findAll { String key, Map _entry -> !findingKeys.contains(key) }.collect { _key, entry -> entry }
        def byClassification = findings.groupBy { it.classification }.collectEntries { k, v -> [k, v.size()] }.sort { a, b -> a.key <=> b.key }
        def unclassified = findings.findAll { it.classification == 'UNCLASSIFIED' }
        def s2Findings = findings.findAll { it.classification.startsWith('S2_') }
        def parallelRuntimeNamespaces = s2Findings.groupBy { it.path }
            .collect { path, pathFindings -> [path: path, findings: pathFindings] }
            .findAll { it.findings.size() > 1 }
            .sort { a, b -> (b.findings.size() <=> a.findings.size()) ?: (a.path <=> b.path) }
        def nestedAtomHints = findings.findAll { (it.nestedAtomCount ?: 0) > 0 }
        def fxUiRuntimeHints = s2Findings.findAll { fxUiRuntimeHintPath(it.path) }
        def forbiddenRuntimeViolations = findings.collectMany { finding ->
            forbiddenRuntimePatternRules.findAll { rule ->
                finding.path ==~ rule.pathPattern &&
                    !(rule.allowedSymbols instanceof Set && rule.allowedSymbols.contains(finding.symbol))
            }.collect { rule ->
                [path          : finding.path,
                 line          : finding.line,
                 symbol        : finding.symbol,
                 classification: finding.classification,
                 kinds         : finding.kinds,
                 reason        : rule.reason]
            }
        }.sort { a, b -> (a.path <=> b.path) ?: (a.line <=> b.line) ?: (a.symbol <=> b.symbol) }

        def md = { Object value ->
            (value == null ? '' : value.toString())
                .replace('|', '\\|')
                .replace('\r', ' ')
                .replace('\n', ' ')
        }

        def report = []
        report << '# Top-level mutable state audit'
        report << ''
        report << "Generated: ${new Date().format('yyyy-MM-dd HH:mm:ss')}"
        report << "Scanned files: ${sourceFiles.size()}"
        report << "Findings: ${findings.size()}"
        report << "Classified findings: ${findings.size() - unclassified.size()}"
        report << "Unclassified findings: ${unclassified.size()}"
        report << "Stale whitelist entries: ${staleWhitelist.size()}"
        report << "S2 runtime findings: ${s2Findings.size()}"
        report << "Parallel runtime store namespaces: ${parallelRuntimeNamespaces.size()}"
        report << "Nested atom hints: ${nestedAtomHints.size()}"
        report << "FX/UI runtime hints: ${fxUiRuntimeHints.size()}"
        report << "Forbidden runtime pattern violations: ${forbiddenRuntimeViolations.size()}"
        report << ''
        report << '## Summary by classification'
        report << ''
        if (byClassification.isEmpty()) {
            report << '- None'
        } else {
            byClassification.each { classification, count ->
                report << "- `${classification}`: ${count}"
            }
        }
        report << ''
        report << '## Findings'
        report << ''
        report << '| classification | path | line | symbol | kind | owner | notes |'
        report << '| --- | --- | ---: | --- | --- | --- | --- |'
        findings.sort { a, b ->
            (a.classification <=> b.classification) ?: (a.path <=> b.path) ?: (a.line <=> b.line) ?: (a.symbol <=> b.symbol)
        }.each { finding ->
            report << "| `${md(finding.classification)}` | `${md(finding.path)}` | ${finding.line} | `${md(finding.symbol)}` | `${md(finding.kinds.join(','))}` | ${md(finding.owner)} | ${md(finding.notes)} |"
        }
        report << ''
        if (!parallelRuntimeNamespaces.isEmpty()) {
            report << '## Parallel runtime store namespaces'
            report << ''
            parallelRuntimeNamespaces.each { entry ->
                def symbols = entry.findings.collect { it.symbol }.sort().join(', ')
                report << "- `${entry.path}` (${entry.findings.size()} findings): `${symbols}`"
            }
            report << ''
        }
        if (!nestedAtomHints.isEmpty()) {
            report << '## Nested atom hints'
            report << ''
            nestedAtomHints.sort { a, b -> (a.path <=> b.path) ?: (a.line <=> b.line) }.each { finding ->
                report << "- `${finding.path}:${finding.line}` `${finding.symbol}` has ${finding.nestedAtomCount} nested atom occurrence(s) beyond the top-level def."
            }
            report << ''
        }
        if (!fxUiRuntimeHints.isEmpty()) {
            report << '## FX/UI runtime hints'
            report << ''
            fxUiRuntimeHints.sort { a, b -> (a.path <=> b.path) ?: (a.line <=> b.line) }.each { finding ->
                report << "- `${finding.path}:${finding.line}` `${finding.symbol}` (${finding.classification}, ${finding.kinds.join(',')})"
            }
            report << ''
        }
        if (!forbiddenRuntimeViolations.isEmpty()) {
            report << '## Forbidden runtime pattern violations'
            report << ''
            report << '| path | line | symbol | classification | kind | reason |'
            report << '| --- | ---: | --- | --- | --- | --- |'
            forbiddenRuntimeViolations.each { violation ->
                report << "| `${md(violation.path)}` | ${violation.line} | `${md(violation.symbol)}` | `${md(violation.classification)}` | `${md(violation.kinds.join(','))}` | ${md(violation.reason)} |"
            }
            report << ''
        }
        if (!staleWhitelist.isEmpty()) {
            report << '## Stale whitelist entries'
            report << ''
            report << '| path | symbol | classification | owner | notes |'
            report << '| --- | --- | --- | --- | --- |'
            staleWhitelist.sort { a, b -> (a.path <=> b.path) ?: (a.symbol <=> b.symbol) }.each { entry ->
                report << "| `${md(entry.path)}` | `${md(entry.symbol)}` | `${md(entry.classification)}` | ${md(entry.owner)} | ${md(entry.notes)} |"
            }
            report << ''
        }
        if (!unclassified.isEmpty()) {
            report << '## Unclassified findings to triage'
            report << ''
            unclassified.sort { a, b -> (a.path <=> b.path) ?: (a.line <=> b.line) }.each { finding ->
                report << "- `${finding.path}:${finding.line}` `${finding.symbol}` (${finding.kinds.join(',')})"
            }
            report << ''
        }

        def outFile = reportFile.get().asFile
        outFile.parentFile.mkdirs()
        outFile.setText(report.join(System.lineSeparator()) + System.lineSeparator(), 'UTF-8')

        if (!unclassified.isEmpty()) {
            logger.warn('[auditTopLevelMutableState] {} unclassified top-level mutable defs. See {}', unclassified.size(), outFile)
        }
        if (!staleWhitelist.isEmpty()) {
            logger.warn('[auditTopLevelMutableState] {} stale whitelist entries. See {}', staleWhitelist.size(), outFile)
        }
        if (!forbiddenRuntimeViolations.isEmpty()) {
            logger.warn('[auditTopLevelMutableState] {} forbidden runtime pattern violations. See {}', forbiddenRuntimeViolations.size(), outFile)
        }
        logger.lifecycle('[auditTopLevelMutableState] wrote {} findings to {}', findings.size(), outFile)
    }
}

tasks.register('verifyMultiplayerOwnerGuards') {
    group = 'verification'
    description = 'Fail when top-level mutable runtime state is missing explicit multiplayer owner governance.'
    dependsOn 'auditTopLevelMutableState'

    def auditReportFile = layout.buildDirectory.file('reports/top-level-state/audit.md')

    inputs.file(auditReportFile)
        .withPropertyName('topLevelMutableStateAuditReport')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)

    doLast {
        def reportFile = auditReportFile.get().asFile
        if (!reportFile.exists()) {
            throw new GradleException("Top-level mutable state audit report not found: ${reportFile}")
        }

        def reportText = reportFile.getText('UTF-8')
        def extractCount = { String label ->
            def matcher = (reportText =~ /(?m)^${java.util.regex.Pattern.quote(label)}:\s*(\d+)\s*$/)
            if (!matcher.find()) {
                throw new GradleException("Could not parse '${label}' from ${reportFile}")
            }
            Integer.parseInt(matcher.group(1))
        }
        def captureSection = { String heading ->
            def lines = []
            boolean capture = false
            reportFile.readLines('UTF-8').each { String line ->
                if (line == heading) {
                    capture = true
                    return
                }
                if (capture && line.startsWith('## ')) {
                    capture = false
                }
                if (capture) {
                    def trimmed = line.trim()
                    if (!trimmed.isEmpty()) {
                        lines << trimmed
                    }
                }
            }
            lines
        }

        def unclassifiedCount = extractCount('Unclassified findings')
        def staleCount = extractCount('Stale whitelist entries')
        def forbiddenCount = extractCount('Forbidden runtime pattern violations')

        if (unclassifiedCount > 0 || staleCount > 0 || forbiddenCount > 0) {
            def detailLines = []
            if (staleCount > 0) {
                detailLines << 'stale whitelist entries:'
                detailLines.addAll(captureSection('## Stale whitelist entries')
                    .findAll { !it.startsWith('| ---') && !it.startsWith('| path |') }
                    .collect { "  ${it}" })
            }
            if (unclassifiedCount > 0) {
                detailLines << 'unclassified findings:'
                detailLines.addAll(captureSection('## Unclassified findings to triage')
                    .collect { "  ${it}" })
            }
            if (forbiddenCount > 0) {
                detailLines << 'forbidden runtime pattern violations:'
                detailLines.addAll(captureSection('## Forbidden runtime pattern violations')
                    .findAll { !it.startsWith('| ---') && !it.startsWith('| path |') }
                    .collect { "  ${it}" })
            }
            throw new GradleException(
                "verifyMultiplayerOwnerGuards failed. Run auditTopLevelMutableState, move runtime state back into explicit owner-bound components, and update docs/dev/top-level-mutable-state-whitelist.tsv when classifications legitimately change. " +
                    "unclassified=${unclassifiedCount}, staleWhitelist=${staleCount}, forbiddenRuntime=${forbiddenCount}, report=${reportFile}" +
                    (detailLines.isEmpty() ? '' : "\n - ${detailLines.join('\n - ')}"))
        }

        logger.lifecycle('[verifyMultiplayerOwnerGuards] passed. Top-level mutable state ownership audit has no unclassified, stale, or forbidden pilot-path entries.')
    }
}

