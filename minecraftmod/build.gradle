tasks.register('verifyPlatformNoBusinessHookIds') {
    group = 'verification'
    description = 'Verify platform hook adapters do not hardcode business hook-id literals (Phase C: mc1201 is shared).'

    doLast {
        def contentFile = file('ac/src/main/clojure/cn/li/ac/content/entities/all.clj')
        // Phase C: Forge/Fabric platform hooks have been removed; mc1201 shared layer handles mapping
        // This verifier now ensures no remaining platform adapter files hardcode business IDs
        
        if (!contentFile.exists()) {
            throw new GradleException("Required platform no-business-id check file not found: ${contentFile}")
        }

        def hookIdMatcher = (contentFile.getText('UTF-8') =~ /:hook\s+:([a-zA-Z0-9\-]+)/)
        def businessHookIds = [] as Set
        hookIdMatcher.each { businessHookIds << it[1] }

        // Collect remaining platform adapter files (non-entity layer, which handles event binding)
        def forgeIntegrationEvents = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/integration/events.clj')
        def fabricIntegrationEvents = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/integration/events.clj')
        
        def platformAdapterFiles = [forgeIntegrationEvents, fabricIntegrationEvents].findAll { it.exists() }
        
        def leakedHookIds = [] as Set
        platformAdapterFiles.each { adapterFile ->
            def adapterText = adapterFile.getText('UTF-8')
            businessHookIds.each { hookId ->
                if (adapterText.contains("\"${hookId}\"")) {
                    leakedHookIds << hookId
                }
            }
        }

        if (!leakedHookIds.isEmpty()) {
            throw new GradleException("Platform adapter contains leaked business hook-id literals: ${leakedHookIds}")
        }

        logger.lifecycle('[verifyPlatformNoBusinessHookIds] passed (Phase C mc1201 shared). scanned business hook ids={}', businessHookIds.size())
    }
}

