tasks.register('verifyArchitectureBoundaries') {
    group = 'verification'
    description = 'Verify architecture boundaries across shared, Minecraft, and loader platform modules.'

    def sourceIncludes = [
        '**/*.clj',
        '**/*.cljc',
        '**/*.cljs',
        '**/*.java',
        '**/*.kt',
        '**/*.kts',
        '**/*.groovy'
    ]

    def makeSourceTree = { String relativeDir ->
        fileTree(relativeDir) {
            include sourceIncludes
            exclude '**/build/**', '**/.gradle/**'
        }
    }

    def acSource = makeSourceTree('ac/src')
    def mcmodSource = makeSourceTree('mcmod/src')
    def mc1201Source = makeSourceTree('mc-1.20.1/src')
    def forge1201MainSource = makeSourceTree('forge-1.20.1/src/main')
    def fabric1201MainSource = makeSourceTree('fabric-1.20.1/src/main')
    def passMarker = layout.buildDirectory.file('verification/verifyArchitectureBoundaries/passed.txt')

    inputs.files(acSource, mcmodSource, mc1201Source, forge1201MainSource, fabric1201MainSource)
        .withPropertyName('architectureBoundarySources')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    outputs.file(passMarker)

    doLast {
        def violations = []

        def isSkippableLine = { String line ->
            def trimmed = line.trim()
            return trimmed.isEmpty() ||
                trimmed.startsWith(';') ||
                trimmed.startsWith('//') ||
                trimmed.startsWith('/*') ||
                trimmed.startsWith('*/') ||
                trimmed.startsWith('*') ||
                trimmed.startsWith('#') ||
                trimmed.startsWith('"') ||
                trimmed.startsWith('\'') ||
                trimmed.startsWith('`')
        }

        def isLikelyCodeLine = { String line ->
            def trimmed = line.trim()
            if (trimmed.isEmpty()) {
                return false
            }
            def first = trimmed.charAt(0)
            return trimmed.startsWith('import ') ||
                trimmed.startsWith('package ') ||
                trimmed.startsWith('(ns ') ||
                trimmed.startsWith('(:require') ||
                trimmed.startsWith('(:import') ||
                trimmed.endsWith(';') ||
                ['(', '[', '{', ':', '^', '@'].contains(String.valueOf(first))
        }

        def ruleSpecs = [
            [
                rule: 'AC_MCMOD_NO_MINECRAFT_OR_FORGE',
                scopes: ['ac', 'mcmod'] as Set,
                pattern: ~/(net\.minecraft(?!\.client)|net\.minecraftforge)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'AC_NO_PLATFORM_NS_DEPENDENCY',
                scopes: ['ac'] as Set,
                pattern: ~/(cn\.li\.(forge|fabric)\d*)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'NON_CLIENT_NO_MC_CLIENT_IMPORT',
                scopes: ['ac', 'mcmod'] as Set,
                pattern: ~/net\.minecraft\.client/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'MC1201_NO_LOADER_IMPORT',
                scopes: ['mc1201'] as Set,
                pattern: ~/(net\.minecraftforge|net\.fabricmc|net\.neoforged|cn\.li\.(forge|fabric|neoforge))/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'MC1201_NO_AC_STATIC_DEPENDENCY',
                scopes: ['mc1201'] as Set,
                pattern: ~/cn\.li\.ac\./,
                shouldCheckLine: { String line -> !isSkippableLine(line) }
            ],
            [
                rule: 'FORGE1201_NO_FABRIC_API_OR_NS',
                scopes: ['forge1201'] as Set,
                pattern: ~/(net\.fabricmc|cn\.li\.fabric1201|ModInitializer)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'FABRIC1201_NO_FORGE_API_OR_NS',
                scopes: ['fabric1201'] as Set,
                pattern: ~/(net\.minecraftforge|cn\.li\.forge1201|@Mod\b)/,
                shouldCheckLine: { String line -> !isSkippableLine(line) && isLikelyCodeLine(line) }
            ],
            [
                rule: 'PLATFORM_NO_AC_STATIC_OR_HARDCODED_DEPENDENCY',
                scopes: ['forge1201', 'fabric1201'] as Set,
                pattern: ~/cn\.li\.ac\./,
                shouldCheckLine: { String line -> !isSkippableLine(line) }
            ]
        ]

        def markerFile = passMarker.get().asFile
        if (markerFile.exists()) {
            markerFile.delete()
        }

        def filesByRelativePath = new TreeMap<String, Map>()
        def addScopedFiles = { String scope, FileTree tree ->
            tree.files.each { File file ->
                def rel = project.rootDir.toPath().relativize(file.toPath()).toString().replace('\\', '/')
                def entry = filesByRelativePath[rel]
                if (entry == null) {
                    entry = [file: file, scopes: new LinkedHashSet<String>()]
                    filesByRelativePath[rel] = entry
                }
                entry.scopes.add(scope)
            }
        }

        addScopedFiles('ac', acSource)
        addScopedFiles('mcmod', mcmodSource)
        addScopedFiles('mc1201', mc1201Source)
        addScopedFiles('forge1201', forge1201MainSource)
        addScopedFiles('fabric1201', fabric1201MainSource)

        filesByRelativePath.each { String rel, Map entry ->
            def applicableRules = ruleSpecs.findAll { rule ->
                !java.util.Collections.disjoint(rule.scopes, entry.scopes)
            }
            if (applicableRules.isEmpty()) {
                return
            }

            entry.file.readLines('UTF-8').eachWithIndex { String line, int idx ->
                applicableRules.each { rule ->
                    if (rule.shouldCheckLine(line) && rule.pattern.matcher(line).find()) {
                        violations << [
                            rule   : rule.rule,
                            file   : rel,
                            lineNo : idx + 1,
                            text   : line.trim()
                        ]
                    }
                }
            }
        }

        def nonClientViolations = violations.findAll {
            it.rule == 'NON_CLIENT_NO_MC_CLIENT_IMPORT' &&
                !(it.file.contains('/client/') || it.file.contains('\\client\\'))
        }
        violations.removeAll { it.rule == 'NON_CLIENT_NO_MC_CLIENT_IMPORT' }
        violations.addAll(nonClientViolations)

        if (!violations.isEmpty()) {
            logger.error('Architecture boundary violations found ({}):', violations.size())
            violations.each { v ->
                logger.error('  [{}] {}:{} -> {}', v.rule, v.file, v.lineNo, v.text)
            }
            throw new GradleException('verifyArchitectureBoundaries failed. See violations above.')
        }

        markerFile.parentFile.mkdirs()
        markerFile.text = "passed files=${filesByRelativePath.size()} rules=${ruleSpecs.size()}${System.lineSeparator()}"
        logger.lifecycle('[verifyArchitectureBoundaries] passed. Scanned {} files with {} rules.', filesByRelativePath.size(), ruleSpecs.size())
    }
}

