tasks.register('verifyPlatformNoBusinessHookIds') {
    group = 'verification'
    description = 'Verify shared/platform hook layers do not hardcode business hook-id literals.'

    doLast {
        def contentFile = file('ac/src/main/clojure/cn/li/ac/content/entities/all.clj')
        // Phase C: Forge/Fabric platform hooks have been removed; AC owns
        // business hook-id -> impl-key mapping and mc1201 consumes a generic
        // resolver. This verifier ensures no remaining mcmod/mc1201/platform
        // files hardcode business hook IDs.

        if (!contentFile.exists()) {
            throw new GradleException("Required platform no-business-id check file not found: ${contentFile}")
        }

        def hookIdMatcher = (contentFile.getText('UTF-8') =~ /:hook\s+:([a-zA-Z0-9\-]+)/)
        def businessHookIds = [] as Set
        hookIdMatcher.each { businessHookIds << it[1] }

        // Collect remaining platform adapter files (non-entity layer, which handles event binding)
        def forgeIntegrationEvents = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/integration/events.clj')
        def fabricIntegrationEvents = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/integration/events.clj')

        def mcmodSourceFiles = fileTree('mcmod/src/main/clojure') {
            include '**/*.clj'
            exclude '**/build/**'
        }.files
        def mc1201SourceFiles = fileTree('mc-1.20.1/src/main/clojure') {
            include '**/*.clj'
            exclude '**/build/**'
        }.files
        def platformAdapterFiles = ([forgeIntegrationEvents, fabricIntegrationEvents].findAll { it.exists() } + mcmodSourceFiles + mc1201SourceFiles)

        def leakedHookIds = [] as Set
        platformAdapterFiles.each { adapterFile ->
            def adapterText = adapterFile.getText('UTF-8')
            businessHookIds.each { hookId ->
                if (adapterText.contains("\"${hookId}\"")) {
                    leakedHookIds << hookId
                }
            }
        }

        if (!leakedHookIds.isEmpty()) {
            throw new GradleException("Platform adapter contains leaked business hook-id literals: ${leakedHookIds}")
        }

        logger.lifecycle('[verifyPlatformNoBusinessHookIds] passed. scanned business hook ids={}', businessHookIds.size())
    }
}

tasks.register('verifyPlatformNoAbilityMessageIds') {
    group = 'verification'
    description = 'Verify shared/platform layers do not hardcode AC ability runtime network message ids.'

    doLast {
        def platformSourceFiles = [] as Set
        ['mcmod/src/main/clojure',
         'mc-1.20.1/src/main/clojure',
         'forge-1.20.1/src/main/clojure',
         'fabric-1.20.1/src/main/clojure'].each { sourcePath ->
            platformSourceFiles.addAll(fileTree(sourcePath) {
                include '**/*.clj'
                exclude '**/build/**'
            }.files)
        }

        def messageIdPattern = ~/"ability:(ctx|skill|sync|req)\/[^"]+"/
        def violations = []
        platformSourceFiles.each { sourceFile ->
            def rel = project.rootDir.toPath().relativize(sourceFile.toPath()).toString().replace('\\', '/')
            sourceFile.readLines('UTF-8').eachWithIndex { line, idx ->
                def matcher = (line =~ messageIdPattern)
                matcher.each { match ->
                    violations << "${rel}:${idx + 1}: ${match[0]}"
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Shared/platform layers contain AC ability message-id literals:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyPlatformNoAbilityMessageIds] passed. AC ability message ids stay in ac-owned catalogs.')
    }
}

tasks.register('verifyMcmodHooksNoBusinessStateReads') {
    group = 'verification'
    description = 'Verify mcmod/mc1201 runtime hooks do not inspect AC ability resource activation state directly.'

    doLast {
        def violations = []
        def stateReadPattern = ~/\[:resource-data\s+:activated\]/
        def scannedFiles = [] as Set
        ['mcmod/src/main/clojure',
         'mc-1.20.1/src/main/clojure'].each { sourcePath ->
            scannedFiles.addAll(fileTree(sourcePath) {
                include '**/*.clj'
                exclude '**/build/**'
            }.files)
        }

        scannedFiles.each { sourceFile ->
            def rel = project.rootDir.toPath().relativize(sourceFile.toPath()).toString().replace('\\', '/')
            def text = sourceFile.getText('UTF-8')
            def matcher = (text =~ stateReadPattern)
            if (matcher.find()) {
                violations << "${rel}: direct [:resource-data :activated] read"
            }
        }

        def hooksCore = file('mcmod/src/main/clojure/cn/li/mcmod/hooks/core.clj')
        if (hooksCore.exists()) {
            def text = hooksCore.getText('UTF-8')
            if (text.contains(':reflection-search-radius (fn [] 10.0)')) {
                violations << 'mcmod/src/main/clojure/cn/li/mcmod/hooks/core.clj: AC reflection radius default must stay in ac config'
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Runtime hook business-state residue found:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyMcmodHooksNoBusinessStateReads] passed. Runtime activation/default policy is provided by installed AC hooks.')
    }
}

tasks.register('verifyMcmodCommandNoAcAbilityActions') {
    group = 'verification'
    description = 'Verify mcmod/mc1201 command infrastructure does not hardcode AC ability command action ids or state shapes.'

    doLast {
        def forbiddenActionTokens = [
            ':switch-category',
            ':learn-node',
            ':unlearn-node',
            ':learn-all-nodes',
            ':list-learned-nodes',
            ':list-available-nodes',
            ':set-level',
            ':set-node-exp',
            ':restore-cp',
            ':clear-cooldowns',
            ':reset-abilities',
            ':maxout-progression',
            ':enable-cheats',
            ':disable-cheats'
        ]
        def forbiddenStateTokens = [
            ':ability-data',
            ':resource-data',
            'default-ability-data',
            'get-player-runtime-data',
            'set-player-runtime-data'
        ]
        def violations = []
        def scannedFiles = [] as Set
        ['mcmod/src/main/clojure/cn/li/mcmod/command',
         'mc-1.20.1/src/main/clojure/cn/li/mc1201/command'].each { sourcePath ->
            scannedFiles.addAll(fileTree(sourcePath) {
                include '**/*.clj'
                exclude '**/build/**'
            }.files)
        }

        scannedFiles.each { sourceFile ->
            def rel = project.rootDir.toPath().relativize(sourceFile.toPath()).toString().replace('\\', '/')
