def collectRelativeFiles = { File rootDir, String relativeDir, Set<String> excludedRelPaths ->
    def base = new File(rootDir, relativeDir)
    if (!base.exists()) {
        return [] as List<String>
    }
    fileTree(base).files
        .findAll { it.isFile() }
        .collect { File f ->
            rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')
        }
        .findAll { !excludedRelPaths.contains(it) }
        .sort()
}

def compareFileContents = { File forgeRoot, File fabricRoot, String relPath ->
    def forgeFile = new File(forgeRoot, relPath)
    def fabricFile = new File(fabricRoot, relPath)

    if (relPath.endsWith('.json')) {
        def slurper = new groovy.json.JsonSlurper()
        def canonicalize
        canonicalize = { value, String currentPath = null ->
            if (value instanceof Map) {
                def normalized = value.collectEntries { k, v ->
                    def key = k.toString()
                    def nextPath = currentPath ? "${currentPath}.${key}" : key
                    [(key): canonicalize(v, nextPath)]
                }

                if (relPath.startsWith('data/my_mod/recipes/')) {
                    normalized.remove('category')
                    normalized.remove('show_notification')
                }

                if (normalized.containsKey('parent') && normalized.parent instanceof String) {
                    normalized.parent = normalized.parent.replaceFirst(/^minecraft:/, '')
                }

                return new TreeMap(normalized)
            }
            if (value instanceof List) {
                return value.collect { canonicalize(it, currentPath) }
            }
            return value
        }

        def forgeJson = canonicalize(slurper.parseText(forgeFile.getText('UTF-8')))
        def fabricJson = canonicalize(slurper.parseText(fabricFile.getText('UTF-8')))
        return forgeJson == fabricJson
    }

    def forgeText = forgeFile.getText('UTF-8').replace('\r\n', '\n')
    def fabricText = fabricFile.getText('UTF-8').replace('\r\n', '\n')
    forgeText == fabricText
}

tasks.register('verifyForgeFabricDatagenParity') {
    group = 'verification'
    description = 'Compare aligned Forge/Fabric generated resources for shared datagen outputs (recipes, blockstates, item/block models, and lang).'

    def forgeGeneratedRoot = file('forge-1.20.1/src/generated/resources')
    def fabricGeneratedRoot = file('fabric-1.20.1/src/generated/resources')
    def passMarker = layout.buildDirectory.file('verification/verifyForgeFabricDatagenParity/passed.txt')

    inputs.dir(forgeGeneratedRoot)
        .withPropertyName('forgeGeneratedResources')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
        .optional()
    inputs.dir(fabricGeneratedRoot)
        .withPropertyName('fabricGeneratedResources')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
        .optional()
    outputs.file(passMarker)
    outputs.cacheIf { true }

    doLast {
        def markerFile = passMarker.get().asFile
        if (markerFile.exists()) {
            markerFile.delete()
        }

        def forgeRoot = forgeGeneratedRoot
        def fabricRoot = fabricGeneratedRoot

        def sections = [
            'data/my_mod/recipes'               : [] as Set<String>,
            'assets/my_mod/blockstates'         : [] as Set<String>,
            'assets/my_mod/models/block'        : [] as Set<String>,
            'assets/my_mod/models/item'         : [] as Set<String>,
            'assets/my_mod/lang'                : [] as Set<String>,
        ]

        def mismatches = [] as List<String>

        sections.each { relativeDir, excluded ->
            def forgeFiles = collectRelativeFiles(forgeRoot, relativeDir, excluded as Set<String>)
            def fabricFiles = collectRelativeFiles(fabricRoot, relativeDir, excluded as Set<String>)

            def onlyForge = (forgeFiles - fabricFiles)
            def onlyFabric = (fabricFiles - forgeFiles)
            if (!onlyForge.isEmpty() || !onlyFabric.isEmpty()) {
                mismatches << "${relativeDir}: file-set mismatch forgeOnly=${onlyForge} fabricOnly=${onlyFabric}"
                return
            }

            def changed = forgeFiles.findAll { rel -> !compareFileContents(forgeRoot, fabricRoot, rel) }
            if (!changed.isEmpty()) {
                mismatches << "${relativeDir}: content mismatch files=${changed}"
            }
        }

        if (!mismatches.isEmpty()) {
            throw new GradleException("Forge/Fabric datagen parity check failed:\n - ${mismatches.join('\n - ')}")
        }

        markerFile.parentFile.mkdirs()
        markerFile.text = "passed sections=${sections.keySet().size()}${System.lineSeparator()}"
        logger.lifecycle('[verifyForgeFabricDatagenParity] passed. sections={}', sections.keySet().size())
    }
}

def registerForgeGameTestTask = {
    def forgeProject = project(':forge-1.20.1')
    def candidates = [
        'runGameTestServer',
        'runGametestServer',
        'gameTestServer',
        'runGameTests',
        'runGametests'
    ]
    def gameTestTasks = forgeProject.tasks.matching { candidates.contains(it.name) }

    def prepareGameTestRun = tasks.register('prepareForgeGameTestRun') {
        group = 'verification'
        description = 'Prepare run directories and minimal structures for Forge GameTest execution.'

        doLast {
            def runGameTestDir = file('forge-1.20.1/run-gametest')
            def legacyRunDir = file('forge-1.20.1/run')
            def lockFile = file('forge-1.20.1/run-gametest/world/session.lock')
            def serverProperties = file('forge-1.20.1/run-gametest/server.properties')
            def legacyServerProperties = file('forge-1.20.1/run/server.properties')
            def gameTestStructuresDir = file('forge-1.20.1/run-gametest/gameteststructures')
            def emptyStructure = file('forge-1.20.1/run-gametest/gameteststructures/empty.snbt')

            if (lockFile.exists()) {
                if (!lockFile.delete()) {
                    throw new GradleException("Forge GameTest world lock is held: ${lockFile}. Stop stale runGameTestServer processes and retry.")
                }
                logger.lifecycle('[runForgeGameTests] removed stale world lock: {}', lockFile)
            }
            if (!runGameTestDir.exists()) {
                runGameTestDir.mkdirs()
            }
            if (!legacyRunDir.exists()) {
                legacyRunDir.mkdirs()
            }
            if (!gameTestStructuresDir.exists()) {
                gameTestStructuresDir.mkdirs()
            }
            if (!emptyStructure.exists()) {
                emptyStructure.text = '{DataVersion:3465,size:[1,1,1],palette:[{Name:"minecraft:air"}],blocks:[],entities:[]}' + System.lineSeparator()
            }
            // Avoid local dedicated-server conflicts in CI/dev machines.
            serverProperties.text = "server-port=0${System.lineSeparator()}online-mode=false${System.lineSeparator()}"
            legacyServerProperties.text = "server-port=0${System.lineSeparator()}online-mode=false${System.lineSeparator()}"

            // GameTest already uses an ephemeral port through server.properties and
            // the Loom run config (`--port 0`). Keep legacy 25565 cleanup opt-in so
            // the normal prep task does not spend time probing/killing unrelated dev servers.
            if (project.findProperty('forgeGameTestCleanPort25565')?.toString()?.toBoolean()) {
                try {
                    def portProbe = ['cmd', '/c', 'netstat -ano | findstr ":25565"']
                        .execute()
                    portProbe.waitFor()
                    def listeners = portProbe.in.text.readLines()
                        .findAll { it.contains('LISTENING') }
                    listeners.each { line ->
                        def parts = line.trim().split(/\s+/)
                        def pid = parts ? parts[-1] : null
                        if (pid?.isInteger()) {
                            logger.lifecycle('[runForgeGameTests] killing stale listener on 25565, pid={}', pid)
                            ['cmd', '/c', "taskkill /PID ${pid} /F"].execute().waitFor()
                        }
                    }
                } catch (Exception e) {
                    logger.lifecycle('[runForgeGameTests] failed to pre-clean 25565 listener: {}', e.message)
                }
            }
        }
    }

    gameTestTasks.configureEach { dependsOn prepareGameTestRun }

    tasks.register('runForgeGameTests') {
        group = 'verification'
        description = 'Run Forge GameTest server using official task exit code.'
        dependsOn 'unitTestCompile', ':forge-1.20.1:compileClojure', prepareGameTestRun
        if (!gameTestTasks.isEmpty()) {
            dependsOn gameTestTasks
        }

        onlyIf {
            if (gameTestTasks.isEmpty()) {
                logger.lifecycle('[runForgeGameTests] skipped. No Forge GameTest task found. Checked: {}', candidates.join(', '))
                return false
            }
            logger.lifecycle('[runForgeGameTests] using task(s): {}', gameTestTasks.collect { it.path }.join(', '))
            return true
        }
    }
}

registerForgeGameTestTask()

tasks.register('validateForgeGameTestLog') {
    group = 'verification'
    description = 'Fail verification when Forge GameTest run log contains known fatal startup/runtime errors.'
    dependsOn 'runForgeGameTests'

    doLast {
        def logFile = file('forge-1.20.1/run-gametest/logs/latest.log')
        if (!logFile.exists()) {
            throw new GradleException("Forge GameTest log not found: ${logFile}")
        }
        def gameTestJava = file('forge-1.20.1/src/main/java/cn/li/forge1201/gametest/ForgeSmokeGameTests.java')
        def batchReport = file('build/reports/forge-gametest-batch-report.txt')

        def requiredMarkerGroups = [
            ['Starting minecraft server version', 'Started game test server'],
            ['Loading properties', 'Preparing start region for dimension']
        ]
        def fatalPatterns = [
            'Failed to load Clojure mod implementation',
            'RuntimeDistCleaner',
            'Failed to load registries due to above errors',
            'Unknown registry key in ResourceKey[minecraft:root / minecraft:worldgen/feature]',
            'Failed to parse my_mod:worldgen/configured_feature/phase_liquid_pool.json',
            'Could not find structure file',
            'Failed to start the minecraft server',
            'The process cannot access the file because another process has locked a portion of the file'
        ]

        def logScan = scanLogForFatalPatterns(logFile, fatalPatterns, requiredMarkerGroups)
        def missingMarkerGroups = logScan.missingMarkerGroups
        if (!missingMarkerGroups.isEmpty()) {
            def display = missingMarkerGroups.collect { it.join(' | ') }
            throw new GradleException("Forge GameTest log is missing expected startup marker groups: ${display}")
        }

        def matchedFatalPatterns = logScan.matchedFatalPatterns
        if (!matchedFatalPatterns.isEmpty()) {
            throw new GradleException("Forge GameTest log contains fatal errors: ${matchedFatalPatterns}")
        }

        def logText = logFile.getText('UTF-8')

        // Build a per-batch report from declared @GameTest methods.
        // This keeps verification output actionable even when Forge server lifecycle
        // does not auto-exit with explicit per-test summaries.
        def batchByMethod = [:]
        if (gameTestJava.exists()) {
            def src = gameTestJava.getText('UTF-8')
            def matcher = (src =~ /@GameTest\([^)]*batch\s*=\s*"([^"]+)"[^)]*\)\s*public\s+static\s+void\s+([A-Za-z0-9_]+)\s*\(/)
            matcher.each { m ->
                batchByMethod[m[2]] = m[1]
            }
        }

        def lowerLogText = logText.toLowerCase(Locale.ROOT)
        def allPassedMatcher = (logText =~ /All\s+(\d+)\s+required tests passed/)
        def allDeclaredTestsPassed = false
        if (allPassedMatcher.find()) {
            allDeclaredTestsPassed = Integer.parseInt(allPassedMatcher.group(1)) >= batchByMethod.size()
        }

        def runningCounts = []
        def runningMatcher = (logText =~ /(\d+)\s+tests are now running!?/)
        runningMatcher.each { m -> runningCounts << Integer.parseInt(m[1]) }
        def completeCounts = []
        def completeMatcher = (logText =~ /(\d+)\s+GAME TESTS COMPLETE/)
        completeMatcher.each { m -> completeCounts << Integer.parseInt(m[1]) }
        def latestRunningCount = runningCounts.isEmpty() ? null : runningCounts[-1]
        def latestCompleteCount = completeCounts.isEmpty() ? null : completeCounts[-1]

        if (!batchByMethod.isEmpty()
            && !allDeclaredTestsPassed
            && ((latestRunningCount != null && latestRunningCount == 0)
                || (latestRunningCount == null && latestCompleteCount != null && latestCompleteCount == 0))) {
            throw new GradleException("Forge GameTest server ran 0 tests even though ${batchByMethod.size()} @GameTest methods are declared")
        }

        def statusByBatch = [:].withDefault { [passed: 0, failed: 0, notObserved: 0] }
        batchByMethod.each { methodName, batch ->
            def methodLower = methodName.toLowerCase(Locale.ROOT)
            def passed = allDeclaredTestsPassed || (lowerLogText.contains(methodLower) && (lowerLogText.contains('passed') || lowerLogText.contains('succeeded')))
            def failed = (!allDeclaredTestsPassed && lowerLogText.contains(methodLower) && (lowerLogText.contains('failed') || lowerLogText.contains('error')))
            if (failed) {
                statusByBatch[batch].failed++
            } else if (passed) {
                statusByBatch[batch].passed++
            } else {
                statusByBatch[batch].notObserved++
            }
        }

        batchReport.parentFile.mkdirs()
        def lines = []
        lines << "Forge GameTest Batch Report"
        lines << "log=${logFile}"
        lines << "timestamp=${new Date().format('yyyy-MM-dd HH:mm:ss')}"
        lines << ""
        if (statusByBatch.isEmpty()) {
            lines << "No @GameTest methods were discovered in ForgeSmokeGameTests.java"
        } else {
            statusByBatch.keySet().sort().each { batch ->
                def row = statusByBatch[batch]
                def overall = row.failed > 0 ? 'FAILED' : (row.passed > 0 ? 'PASSED' : 'NOT_OBSERVED')
                lines << String.format(Locale.ROOT,
                    "batch=%s overall=%s passed=%d failed=%d not_observed=%d",
                    batch, overall, row.passed, row.failed, row.notObserved)
            }
        }
        batchReport.setText(lines.join(System.lineSeparator()) + System.lineSeparator(), 'UTF-8')
        logger.lifecycle('[validateForgeGameTestLog] wrote batch report: {}', batchReport)
    }
}

