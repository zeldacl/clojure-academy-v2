            'cgui-doc/read-xml',
            'cn.li.mcmod.gui.tabbed-gui',
            'tabbed-gui/attach-tab-sync!',
            'cn.li.ac.gui.platform-adapter',
            'gui/get-menu-container-id',
            'cn.li.mcmod.gui.cgui-screen',
            'cgui-screen/create-cgui-screen-container'
        ]
        simpleTechUiGuis.each { path ->
            def f = file(path)
            if (!f.exists()) {
                violations << "Simple TechUI GUI missing: ${path}"
            } else {
                def text = f.getText('UTF-8')
                if (!text.contains('cn.li.ac.gui.tech-ui-common')) {
                    violations << "${path}: must require cn.li.ac.gui.tech-ui-common"
                }
                if (!(text.contains('tech-ui/create-tech-screen-container') ||
