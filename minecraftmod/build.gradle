tasks.register('verifyTransientBuildArtifactsIgnored') {
    group = 'verification'
    description = 'Verify transient build/log capture artifacts are ignored and not tracked.'

    doLast {
        def ignoreFile = file('.gitignore')
        if (!ignoreFile.exists()) {
            throw new GradleException('Required .gitignore file not found.')
        }

        def ignoreLines = ignoreFile.readLines('UTF-8').collect { it.trim() } as Set
        def requiredIgnorePatterns = ['build', '*.log', '/build-*.txt', '/compile-*.txt']
        def missingIgnorePatterns = requiredIgnorePatterns.findAll { !ignoreLines.contains(it) }
        if (!missingIgnorePatterns.isEmpty()) {
            throw new GradleException("Missing transient artifact ignore patterns in .gitignore: ${missingIgnorePatterns}")
        }

        def gitOutput = new ByteArrayOutputStream()
        exec {
            workingDir rootDir
            commandLine 'git', 'ls-files'
            standardOutput = gitOutput
        }

        def transientTracked = gitOutput.toString('UTF-8')
            .readLines()
            .findAll { String rel ->
                def rootFile = !rel.contains('/')
                def rootCapture = rootFile && (rel ==~ /(build|compile)-.*\.txt/ || rel ==~ /.*\.log/)
                def buildCapture = rel.startsWith('build/') && (rel ==~ /(?i).*\.(txt|log|ps1|orig|clj)/ || rel.contains('/orig-'))
                (rootCapture || buildCapture) && file(rel).exists()
            }

        if (!transientTracked.isEmpty()) {
            throw new GradleException("Transient build/log artifacts are tracked and should be removed from Git:\n - ${transientTracked.join('\n - ')}")
        }

        logger.lifecycle('[verifyTransientBuildArtifactsIgnored] passed. Transient build/log captures are ignored and absent from Git index.')
    }
}

tasks.register('verifyLoaderEntrypointNames') {
    group = 'verification'
    description = 'Verify active Forge/Fabric loader entrypoints use explicit start-<loader>-mod! names.'

    doLast {
        def entrypoints = [
            [loader: 'Forge', javaFile: file('forge-1.20.1/src/main/java/cn/li/forge1201/MyMod1201.java'), cljFile: file('forge-1.20.1/src/main/clojure/cn/li/forge1201/mod.clj'), startFn: 'start-forge-mod!'],
            [loader: 'Fabric', javaFile: file('fabric-1.20.1/src/main/java/cn/li/fabric1201/MyModFabric.java'), cljFile: file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/mod.clj'), startFn: 'start-fabric-mod!']
        ]

        def violations = []
        entrypoints.each { entry ->
            [entry.javaFile, entry.cljFile].each { File f ->
                if (!f.exists()) {
                    violations << "${entry.loader}: required entrypoint file missing: ${f}"
                }
            }
            if (!entry.javaFile.exists() || !entry.cljFile.exists()) {
                return
            }

            def javaText = entry.javaFile.getText('UTF-8')
            def cljText = entry.cljFile.getText('UTF-8')
            if (!javaText.contains(entry.startFn)) {
                violations << "${entry.loader}: Java entrypoint must call ${entry.startFn}"
            }
            if (!cljText.contains("(defn ${entry.startFn}")) {
                violations << "${entry.loader}: Clojure entrypoint must define ${entry.startFn}"
            }
            if (javaText.contains('mod-init') || cljText.contains('(defn mod-init')) {
                violations << "${entry.loader}: legacy mod-init entrypoint name must not return"
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Loader entrypoint naming guard failed:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyLoaderEntrypointNames] passed. Forge/Fabric use explicit start-<loader>-mod! entrypoints.')
    }
}

tasks.register('verifyNoContentVersionAdapters') {
    group = 'verification'
    description = 'Verify AC content is not moved into version/loader-specific adapter modules or source sets.'

    doLast {
        def violations = []
        def contentPrefix = 'a' + 'c-'
        def versionPrefix = 'content' + '-version-'
        def forbiddenName = java.util.regex.Pattern.compile(
            "(?i)(^|[^a-z0-9])(" +
                java.util.regex.Pattern.quote(contentPrefix) + "(mc|forge|fabric)-|" +
                java.util.regex.Pattern.quote(versionPrefix) +
            ")")

        def buildFiles = [file('settings.gradle'), file('build.gradle')]
        buildFiles.addAll(fileTree('gradle') {
            include '**/*.gradle', '**/*.gradle.kts'
            exclude '**/build/**', '**/.gradle/**'
        }.files)

        buildFiles.findAll { it.exists() }.each { File f ->
            def rel = project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')
            f.readLines('UTF-8').eachWithIndex { String line, int idx ->
                if (forbiddenName.matcher(line).find()) {
                    violations << "${rel}:${idx + 1}: ${line.trim()}"
                }
            }
        }

        project.rootDir.listFiles()?.findAll { it.directory }?.each { File dir ->
            if (forbiddenName.matcher(dir.name).find()) {
                violations << "top-level directory: ${dir.name}"
