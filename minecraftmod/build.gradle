tasks.register('verifyGuiRegistrySpiSsoT') {
    group = 'verification'
    description = 'Verify GUI MenuType lookup uses mc1201 runtime SPI and mcmod metadata does not own platform MenuTypes.'

    doLast {
        def violations = []
        def files = [
            registryCore: file('mcmod/src/main/clojure/cn/li/mcmod/gui/registry_core.clj'),
            dsl: file('mcmod/src/main/clojure/cn/li/mcmod/gui/dsl.clj'),
            metadata: file('mcmod/src/main/clojure/cn/li/mcmod/gui/metadata.clj'),
            providerDispatcher: file('mc-1.20.1/src/main/clojure/cn/li/mc1201/gui/provider/dispatcher.clj'),
            screenRegistry: file('mc-1.20.1/src/main/clojure/cn/li/mc1201/gui/screen/registry.clj'),
            acPlatformAdapter: file('ac/src/main/clojure/cn/li/ac/gui/platform_adapter.clj'),
            forgeRegistry: file('forge-1.20.1/src/main/clojure/cn/li/forge1201/adapter/gui_registry.clj'),
            fabricRegistry: file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/adapter/gui_registry.clj')
        ]

        files.each { name, File f ->
            if (!f.exists()) {
                violations << "Required GUI SPI file missing (${name}): ${project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')}"
            }
        }

        if (files.registryCore.exists()) {
            def text = files.registryCore.getText('UTF-8')
            ['requiring-resolve', ':reload', 'metadata-call', 'resolve-var', '(defn get-menu-type', '(defn register-menu-type!'].each { token ->
                if (text.contains(token)) {
                    violations << "mcmod.gui.registry-core must stay a thin facade without dynamic metadata/MenuType SPI residue: ${token}"
                }
            }
        }

        if (files.metadata.exists()) {
            def text = files.metadata.getText('UTF-8')
            ['platform-menu-types', '(defn register-menu-type!', '(defn get-menu-type', 'unregister-menu-types!'].each { token ->
                if (text.contains(token)) {
                    violations << "mcmod.gui.metadata must not own platform MenuType state: ${token}"
                }
            }
        }

        if (files.dsl.exists()) {
            def text = files.dsl.getText('UTF-8')
            ['requiring-resolve', 'defgui-with-lazy-fns', 'defgui-from-xml'].each { token ->
                if (text.contains(token)) {
                    violations << "mcmod.gui.dsl must not reintroduce dynamic GUI wrapper macros: ${token}"
                }
            }
        }

        [files.providerDispatcher, files.screenRegistry].each { File f ->
            if (f.exists()) {
                def rel = project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')
                def text = f.getText('UTF-8')
                if (!text.contains('cn.li.mc1201.runtime.spi.gui-registry')) {
                    violations << "${rel}: shared GUI flow must require mc1201 runtime GUI registry SPI"
                }
                if (!text.contains('registry-api/get-menu-type')) {
                    violations << "${rel}: MenuType lookup must use registry-api/get-menu-type"
                }
                if (text.contains('gui/get-menu-type')) {
                    violations << "${rel}: shared GUI flow must not read MenuType through mcmod registry-core"
                }
            }
        }

        if (files.acPlatformAdapter.exists()) {
            def text = files.acPlatformAdapter.getText('UTF-8')
            ['metadata/get-menu-type', 'metadata/register-menu-type!', ':register-menu-type!', ':get-menu-type'].each { token ->
                if (text.contains(token)) {
                    violations << "ac.gui.platform-adapter must not install or re-export platform MenuType callbacks: ${token}"
                }
            }
        }

        [files.forgeRegistry, files.fabricRegistry].each { File f ->
            if (f.exists()) {
                def rel = project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')
                def text = f.getText('UTF-8')
                if (!text.contains('registry-api/register-registry-impl!')) {
                    violations << "${rel}: platform GUI registry must install mc1201 runtime GUI registry SPI"
                }
                if (text.contains('gui/register-menu-type!')) {
                    violations << "${rel}: platform registry must not mirror MenuType into mcmod registry-core"
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("GUI registry SPI SSoT guard failed:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyGuiRegistrySpiSsoT] passed. GUI MenuType ownership is isolated to platform registries behind mc1201 runtime SPI.')
    }
}

