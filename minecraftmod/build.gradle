tasks.register('verifyTerminalBridgeInitOrchestration') {
    group = 'verification'
    description = 'Verify terminal GUI widget factories are installed from AC client init and consumed through the generic platform UI bridge.'

    doLast {
        def violations = []
        def acCore = file('ac/src/main/clojure/cn/li/ac/core.clj')
        def acActions = file('ac/src/main/clojure/cn/li/ac/terminal/client/actions.clj')
        def terminalGui = file('ac/src/main/clojure/cn/li/ac/terminal/client/shell.clj')
        def deletedAcTerminalBridge = file('ac/src/main/clojure/cn/li/ac/terminal/client/bridge.clj')
        def deletedTerminalRegistry = file('ac/src/main/clojure/cn/li/ac/terminal/registry.clj')
        def mcmodUi = file('mcmod/src/main/clojure/cn/li/mcmod/platform/ui.clj')
        def forgeInit = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/client/init.clj')
        def forgeCguiBridge = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/client/cgui_screen_bridge.clj')
        def deletedForgeTerminalBridge = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/client/terminal_screen_bridge.clj')

        [acCore, acActions, terminalGui, mcmodUi, forgeInit, forgeCguiBridge].each { f ->
            if (!f.exists()) {
                violations << "Required terminal client file missing: ${project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')}"
            }
        }
        if (deletedForgeTerminalBridge.exists()) {
            violations << 'forge terminal-specific screen bridge must stay deleted; Forge must use the generic CGui screen bridge'
        }
        if (deletedAcTerminalBridge.exists()) {
            violations << 'ac terminal client bridge must stay deleted; widget factories install from client shell via client actions'
        }
        if (deletedTerminalRegistry.exists()) {
            violations << 'ac terminal registry wrapper must stay deleted; catalog owns queries'
        }

        if (acCore.exists()) {
            def text = acCore.getText('UTF-8')
            if (!text.contains('cn.li.ac.terminal.client.actions/install-ui-hooks!')) {
                violations << 'ac/src/main/clojure/cn/li/ac/core.clj: client init must install terminal UI hooks'
            }
            if (!text.contains('hooks/load-all-client-renderers!')) {
                violations << 'ac/src/main/clojure/cn/li/ac/core.clj: client init must still load registered client renderers'
            }
        }
        if (acActions.exists()) {
            def text = acActions.getText('UTF-8')
            if (!text.contains('shell/install-ui-hooks!')) {
                violations << 'ac/src/main/clojure/cn/li/ac/terminal/client/actions.clj: must delegate UI hook install to client shell'
            }
        }
        if (terminalGui.exists()) {
            def text = terminalGui.getText('UTF-8')
            if (!text.contains('platform-ui/register-widget-factory!') || !text.contains(':ac/terminal-gui')) {
                violations << 'ac/src/main/clojure/cn/li/ac/terminal/client/shell.clj: must register AC terminal widget through generic platform UI registry'
            }
            if (!text.contains('create-terminal-gui')) {
                violations << 'ac/src/main/clojure/cn/li/ac/terminal/client/shell.clj: widget factory must create the terminal shell GUI'
            }
            if (!text.contains('client-bridge/open-screen!') || !text.contains(':ac/terminal')) {
                violations << 'ac/src/main/clojure/cn/li/ac/terminal/client/shell.clj: must open terminal through generic mcmod client bridge'
            }
            if (text.contains('cn.li.mcmod.platform.terminal-ui')) {
                violations << 'ac/src/main/clojure/cn/li/ac/terminal/client/shell.clj: must not depend on terminal-ui hook storage directly'
            }
        }
        if (mcmodUi.exists()) {
            def text = mcmodUi.getText('UTF-8')
            if (!text.contains('defn register-widget-factory!') || !text.contains('defn create-widget')) {
                violations << 'mcmod/src/main/clojure/cn/li/mcmod/platform/ui.clj: must expose generic widget factory registration and lookup'
            }
            if (text.contains('cn.li.ac.')) {
                violations << 'mcmod platform UI bridge must stay platform-neutral and AC-free'
            }
        }
        if (forgeInit.exists()) {
            def text = forgeInit.getText('UTF-8')
            if (!text.contains('client-bridge/install-client-bridge!') || !text.contains(':open-simple-gui cgui-screen-bridge/open-simple-gui!')) {
                violations << 'forge client init must expose generic CGui opening through the installed client bridge'
            }
            if (text.contains(':ac/terminal')) {
                violations << 'forge client init must not hardcode AC terminal screen keys'
            }
        }
        if (forgeCguiBridge.exists()) {
            def text = forgeCguiBridge.getText('UTF-8')
            if (!text.contains('defn open-simple-gui!') || !text.contains('cgui-rt/render-tree!')) {
                violations << 'forge CGui screen bridge must provide generic simple CGui screen hosting'
            }
            if (text.contains('cn.li.ac.')) {
                violations << 'forge CGui screen bridge must not import AC terminal internals directly'
            }
            if (text.contains(':ac/terminal')) {
                violations << 'forge CGui screen bridge must not hardcode AC terminal screen keys'
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Terminal bridge initialization guard failed:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyTerminalBridgeInitOrchestration] passed. Terminal widget factories stay AC-owned and Forge consumes only the generic CGui screen bridge.')
    }
}

