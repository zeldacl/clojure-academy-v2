        include 'fabric-1.20.1/src/main/**/*.clj'
        exclude '**/build/**', '**/.gradle/**', '**/bin/**', '**/test/**'
    }

    def keywordIFnPattern = ~/(?<!\#)\((?:map|mapv|filter|filterv|remove|keep|group-by|sort-by|some|mapcat|keep-indexed)\s+:[a-zA-Z]/
    def juxtKeywordPattern = ~/\(juxt\s+:[a-zA-Z]/
    def intoTransducerPattern = ~/\(into\s+\S+\s+\((?:map|mapcat|filter|remove|keep)\s+([a-zA-Z][\w.\$\/-]*|:[\w.-]+)\s*\)\s+\S/
    def constCollectionPattern = ~/\(def\s+\^:const\s+\S+[\s\n]*\[/

    inputs.files(clojureMainSources).withPropertyName('aotIronRulesSources')
    outputs.dir(layout.buildDirectory.dir('verification/verifyAotIronRules'))

    doLast {
        def violations = []
        clojureMainSources.files.findAll { it.isFile() }.sort { it.path }.each { File sourceFile ->
            def rel = project.rootDir.toPath().relativize(sourceFile.toPath()).toString().replace('\\', '/')
            def text = sourceFile.getText('UTF-8')
            text.readLines().eachWithIndex { String line, int idx ->
                if (keywordIFnPattern.matcher(line).find()) {
                    violations << [file: rel, line: idx + 1, rule: 'keyword-as-IFn', text: line.trim()]
                }
                if (juxtKeywordPattern.matcher(line).find()) {
                    violations << [file: rel, line: idx + 1, rule: 'juxt-keyword', text: line.trim()]
                }
                if (intoTransducerPattern.matcher(line).find()) {
                    violations << [file: rel, line: idx + 1, rule: 'into-3arg-transducer', text: line.trim()]
                }
                if (constCollectionPattern.matcher(line).find()) {
                    violations << [file: rel, line: idx + 1, rule: 'const-collection', text: line.trim()]
                }
            }
        }
        if (!violations.isEmpty()) {
            logger.error('[verifyAotIronRules] {} violation(s):', violations.size())
            violations.each { v -> logger.error('  {}:{} [{}] {}', v.file, v.line, v.rule, v.text) }
            throw new GradleException('verifyAotIronRules failed.')
        }
        def marker = layout.buildDirectory.file('verification/verifyAotIronRules/passed.txt').get().asFile
        marker.parentFile.mkdirs()
        marker.setText("passed at ${new Date()}\n", 'UTF-8')
        logger.lifecycle('[verifyAotIronRules] passed.')
    }
}

