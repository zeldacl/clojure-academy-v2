tasks.register('verifyGuiXmlResourcesSync') {
    group = 'verification'
    description = 'Verify GUI XML resources referenced from AC code exist and all shipped GUI XML parses cleanly.'

    doLast {
        def violations = []
        def resourceRoot = file('ac/src/main/resources')
        def guiRoot = file('ac/src/main/resources/assets/my_mod/guis')
        if (!guiRoot.exists()) {
            violations << 'GUI XML resource root missing: ac/src/main/resources/assets/my_mod/guis'
        }

        def xmlFiles = fileTree(guiRoot) { include '**/*.xml' }.files.sort { it.path }
        if (xmlFiles.size() < 24) {
            violations << "Expected at least 24 GUI XML resources, found ${xmlFiles.size()}"
        }

        def parser = new XmlParser(false, false)
        xmlFiles.each { File f ->
            def rel = resourceRoot.toPath().relativize(f.toPath()).toString().replace('\\', '/')
            def text = f.getText('UTF-8')
            if (text.contains('cn.lambdalib2')) {
                violations << "${rel}: old LambdaLib widget/class reference returned"
            }
            try {
                parser.parse(f)
            } catch (Throwable t) {
                violations << "${rel}: XML parse failed: ${t.message}"
            }
        }

        def referenced = [] as Set
        fileTree('ac/src/main/clojure') { include '**/*.clj' }.files.each { File f ->
            def text = f.getText('UTF-8')
            (text =~ /"assets\/my_mod\/guis\/([^"]+\.xml)"/).each { m ->
                referenced << "assets/my_mod/guis/${m[1]}"
            }
            (text =~ /modid\/namespaced-path\s+"guis\/([^"]+\.xml)"/).each { m ->
                referenced << "assets/my_mod/guis/${m[1]}"
            }
            (text =~ /modid\/asset-path\s+"guis"\s+"([^"]+\.xml)"/).each { m ->
                referenced << "assets/my_mod/guis/${m[1]}"
            }
        }

        referenced.sort().each { rel ->
            if (!file("ac/src/main/resources/${rel}").exists()) {
                violations << "AC code references missing GUI XML resource: ${rel}"
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("GUI XML resource sync guard failed:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle("[verifyGuiXmlResourcesSync] passed. ${xmlFiles.size()} GUI XML resources parse and referenced resources exist.")
    }
}

