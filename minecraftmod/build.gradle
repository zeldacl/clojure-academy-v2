plugins {
    // 统一管理插件版本，不在这里 apply
    id "dev.architectury.loom" version "1.13.467" apply false
    id "dev.clojurephant.clojure" version "0.9.1" apply false
    id "com.github.johnrengelman.shadow" version "8.1.1" apply false
}

allprojects {
    group = rootProject.findProperty('mod_group')
    version = rootProject.findProperty('mod_version')

    repositories {
        mavenCentral()
        maven { url "https://maven.architectury.dev/" }
        maven { url "https://maven.fabricmc.net/" }    // 必须，Loom 的底层依赖在此
        maven { url "https://maven.minecraftforge.net" }
        maven { url "https://repo.clojars.org" }
        maven {
            url = 'https://maven.blamejared.com'
            name = 'BlameJared Maven'
        }
    }
}

// 汇总任务依然保留，但在各个子模块 build 完成后触发
tasks.register('gatherJars', Copy) {
    into "$buildDir/distributions"
    subprojects { sp ->
        if (sp.name.startsWith("forge-")) {
            evaluationDependsOn(sp.path) // 确保子项目评估完成
            def remapTask = sp.tasks.findByName('remapJar')
            if (remapTask != null) {
                from remapTask.archiveFile
            }
        }
    }
}

subprojects {
    // clojurephant 0.9.1：checkClojure 在每个 namespace load 后用字符串 eval `(.flush *err*)`，
    // *err* 无类型提示 → 大量 NO_SOURCE_PATH 反射告警。由 buildSrc 替换为带 ^java.io.Writer 的 flush。
    local.ClojurephantFlushFix.configure(project)

    plugins.withId('dev.clojurephant.clojure') {
        tasks.matching { task ->
            task.metaClass.hasProperty(task, 'forkOptions') != null
        }.configureEach { task ->
            if (!task.forkOptions.memoryMaximumSize) {
                task.forkOptions.memoryMaximumSize = '1536m'
            }
            def jvmArgs = (task.forkOptions.jvmArgs ?: []) as List
            ['-Dfile.encoding=UTF-8', '-XX:+UseG1GC'].each { arg ->
                if (!jvmArgs.contains(arg)) {
                    jvmArgs << arg
                }
            }
            task.forkOptions.jvmArgs = jvmArgs
        }

    }

    // 只有应用了 java 或 clojure 插件的子工程才添加此 Task
    plugins.withType(JavaPlugin) {
        tasks.register('printClasspath') {
            doLast {
                def classpathFiles = sourceSets.main.compileClasspath +
                                     sourceSets.main.runtimeClasspath +
                                     files(sourceSets.main.allSource.srcDirs)

                // 打印出该子工程的完整类路径
                println(classpathFiles.filter { it.exists() }.join(File.pathSeparator))
            }
        }
    }
}

gradle.projectsEvaluated {
    subprojects { sp ->
        sp.plugins.withId('dev.clojurephant.clojure') {
            sp.tasks.matching { task ->
                task.name in ['checkClojure', 'checkTestClojure']
            }.configureEach { task ->
                def namespaceReport = sp.layout.buildDirectory.file("reports/clojure/${task.name}-namespaces.txt")
                task.outputs.file(namespaceReport)
                    .withPropertyName("${task.name}NamespaceReport")
                task.doLast {
                    def reportFile = namespaceReport.get().asFile
                    reportFile.parentFile.mkdirs()
                    def selectedNamespaces = (task.namespaces.get() as Set).collect { it.toString() }.sort()
                    reportFile.setText(([
                        "task=${task.path}",
                        "timestamp=${new Date().format('yyyy-MM-dd HH:mm:ss')}",
                        "namespace.count=${selectedNamespaces.size()}",
                        ''
                    ] + selectedNamespaces).join(System.lineSeparator()) + System.lineSeparator(), 'UTF-8')
                    logger.lifecycle('[{}] wrote namespace report: {}', task.path, reportFile)
                }
            }
        }
    }
}

