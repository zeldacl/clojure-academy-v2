tasks.register('verifyAbilityArchitectureStrict') {
    group = 'verification'
    description = 'Fail build when ability architecture reintroduces resolver globals or service-layer direct store writes outside command_runtime.'

    def abilityMainSources = fileTree(project.rootDir) {
        include 'ac/src/main/clojure/cn/li/ac/ability/**/*.clj'
        exclude '**/build/**', '**/.gradle/**', '**/bin/**'
    }
    def serviceSources = fileTree(project.rootDir) {
        include 'ac/src/main/clojure/cn/li/ac/ability/service/**/*.clj'
        exclude '**/build/**', '**/.gradle/**', '**/bin/**'
    }
    def markerFile = layout.buildDirectory.file('verification/ability-architecture/strict-guard.passed.txt')

    inputs.files(abilityMainSources, serviceSources)
        .withPropertyName('abilityArchitectureStrictSources')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    inputs.file(file('build.gradle'))
        .withPropertyName('abilityArchitectureStrictImplementation')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    outputs.file(markerFile)
    outputs.cacheIf { true }

    doLast {
        def resolverGlobalPatterns = [
            ~/session-id-resolver\*/,
            ~/server-session-id-resolver\*/,
            ~/owner-resolver\*/,
            ~/install-session-runtime!/
        ]
        def storeWritePatterns = [
            ~/store\/set-player-state!\*/,
            ~/store\/update-player-state!\*/,
            ~/store\/mark-player-dirty!/,
            ~/store\/remove-player-state!\*/,
            ~/store\/remove-session!/,
            ~/store\/clear-dirty!/
        ]
        def allowedServiceWriteFiles = [
            'ac/src/main/clojure/cn/li/ac/ability/service/command_runtime.clj',
            'ac/src/main/clojure/cn/li/ac/ability/effects/network_handler.clj',
            'ac/src/main/clojure/cn/li/ac/ability/effects/persistence_handler.clj'
        ] as Set

        def reducerOnlyForbiddenPatterns = [
            ~/command-runtime-ready\?/,
            ~/safe-context-data/,
            ~/ctx-reg\/update-context!/,
            ~/sync-register-context-command!/,
            ~/sync-context-status-command!/,
            ~/:command\s+:sync-(ability|resource|cooldown|preset|develop|terminal|context-registry|runtime)-data/,
            ~/:command\s+:apply-server-tick-postprocess/
        ]
        def reducerOnlyScanFiles = fileTree(project.rootDir) {
            include 'ac/src/main/clojure/cn/li/ac/ability/**/*.clj'
            include 'ac/src/main/clojure/cn/li/ac/content/ability/**/*.clj'
            exclude '**/build/**', '**/.gradle/**', '**/bin/**'
        }

        def violations = []

        abilityMainSources.files.findAll { it.isFile() }.sort { it.path }.each { File sourceFile ->
            def rel = project.rootDir.toPath().relativize(sourceFile.toPath()).toString().replace('\\', '/')
            sourceFile.readLines('UTF-8').eachWithIndex { String line, int idx ->
                resolverGlobalPatterns.each { pattern ->
                    if (pattern.matcher(line).find()) {
                        violations << [
                            type: 'resolver-global',
                            file: rel,
                            line: idx + 1,
                            pattern: pattern.pattern(),
                            text: line.trim()
                        ]
                    }
                }
            }
        }

        serviceSources.files.findAll { it.isFile() }.sort { it.path }.each { File sourceFile ->
            def rel = project.rootDir.toPath().relativize(sourceFile.toPath()).toString().replace('\\', '/')
            sourceFile.readLines('UTF-8').eachWithIndex { String line, int idx ->
                storeWritePatterns.each { pattern ->
                    if (pattern.matcher(line).find() && !allowedServiceWriteFiles.contains(rel)) {
                        violations << [
                            type: 'service-direct-write',
                            file: rel,
                            line: idx + 1,
                            pattern: pattern.pattern(),
                            text: line.trim()
                        ]
                    }
                }
            }
        }

        reducerOnlyScanFiles.files.findAll { it.isFile() }.sort { it.path }.each { File sourceFile ->
            def rel = project.rootDir.toPath().relativize(sourceFile.toPath()).toString().replace('\\', '/')
            sourceFile.readLines('UTF-8').eachWithIndex { String line, int idx ->
                reducerOnlyForbiddenPatterns.each { pattern ->
                    if (pattern.matcher(line).find()) {
                        violations << [
                            type: 'reducer-only-residue',
                            file: rel,
                            line: idx + 1,
                            pattern: pattern.pattern(),
                            text: line.trim()
                        ]
                    }
                }
            }
        }

        if (!violations.isEmpty()) {
            logger.error('Ability architecture strict guard violations found ({}):', violations.size())
            violations.each { v ->
                logger.error('  [{}] {}:{} [{}] -> {}', v.type, v.file, v.line, v.pattern, v.text)
            }
            throw new GradleException('verifyAbilityArchitectureStrict failed. Resolve violations above.')
        }

        def out = markerFile.get().asFile
        out.parentFile.mkdirs()
        out.setText("passed ${new Date().format('yyyy-MM-dd HH:mm:ss')}${System.lineSeparator()}", 'UTF-8')
        logger.lifecycle('[verifyAbilityArchitectureStrict] passed.')
    }
}

def scanLogForFatalPatterns = { File logFile, List<String> fatalPatterns, List<List<String>> markerGroups = [] ->
    def matchedFatalPatterns = [] as LinkedHashSet<String>
    def markerHits = markerGroups.collect { false }
    logFile.withReader('UTF-8') { reader ->
        String line
        while ((line = reader.readLine()) != null) {
            fatalPatterns.each { pattern ->
                if (line.contains(pattern)) {
                    matchedFatalPatterns << pattern
                }
            }
            markerGroups.eachWithIndex { group, idx ->
                if (!markerHits[idx] && group.any { marker -> line.contains(marker) }) {
                    markerHits[idx] = true
                }
            }
            if (!matchedFatalPatterns.isEmpty()) {
                break
            }
        }
    }
    return [
        matchedFatalPatterns: matchedFatalPatterns as List,
        missingMarkerGroups : markerGroups.withIndex().findAll { group, idx -> !markerHits[idx] }.collect { group, idx -> group }
    ]
}

