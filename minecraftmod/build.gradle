def extractMapBody = { String text, String mapName ->
    def matcher = (text =~ /(?s)def\s+\^:private\s+${mapName}\s*\{(.*?)\}/)
    matcher.find() ? matcher.group(1) : null
}

def extractKeywordSet = { String mapBody ->
    if (mapBody == null) {
        return [] as Set
    }
    def matcher = (mapBody =~ /:([a-zA-Z0-9\-]+)/)
    def out = [] as Set
    matcher.each { out << it[1] }
    out
}

def extractTaggedMapBodies = { String text, String tag ->
    def escaped = java.util.regex.Pattern.quote(tag)
    def matcher = (text =~ /(?s)${escaped}\s*\{(.*?)\}/)
    def out = []
    matcher.each { out << it[1] }
    out
}

tasks.register('verifyForgeHookCoverage') {
    group = 'verification'
    description = 'Verify hook implementation keys cover AC hook catalog declarations (Phase C: mc1201 is shared source).'

    def hookCatalog = file('ac/src/main/clojure/cn/li/ac/entity/hook_catalog.clj')
    def sharedHookCore = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/entity/hook_registry_core.clj')
    def passMarker = layout.buildDirectory.file('verification/verifyForgeHookCoverage/passed.txt')

    inputs.files(hookCatalog, sharedHookCore)
        .withPropertyName('forgeHookCoverageSources')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    outputs.file(passMarker)
    outputs.cacheIf { true }

    doLast {
        def markerFile = passMarker.get().asFile
        if (markerFile.exists()) {
            markerFile.delete()
        }

        [hookCatalog, sharedHookCore].each { f ->
            if (!f.exists()) {
                throw new GradleException("Required hook coverage file not found: ${f}")
            }
        }

        def catalogText = hookCatalog.getText('UTF-8')
        def sharedHookText = sharedHookCore.getText('UTF-8')

        def effectCatalogImpls = extractKeywordSet(extractMapBody(catalogText, 'effect-hook->impl-key'))
        def rayCatalogImpls = extractKeywordSet(extractMapBody(catalogText, 'ray-hook->impl-key'))
        def markerCatalogImpls = extractKeywordSet(extractMapBody(catalogText, 'marker-hook->impl-key'))
        def sharedImpls = extractKeywordSet(extractTaggedMapBodies(sharedHookText, ':impl-key->hook-class').join('\n'))

        def missingEffect = (effectCatalogImpls - sharedImpls)
        def missingRay = (rayCatalogImpls - sharedImpls)
        def missingMarker = (markerCatalogImpls - sharedImpls)

        if (!missingEffect.isEmpty() || !missingRay.isEmpty() || !missingMarker.isEmpty()) {
            throw new GradleException("Hook coverage missing impl keys in mc1201 (Phase C shared layer). effect=${missingEffect} ray=${missingRay} marker=${missingMarker}")
        }

        markerFile.parentFile.mkdirs()
        markerFile.text = "passed effect=${effectCatalogImpls.size()} ray=${rayCatalogImpls.size()} marker=${markerCatalogImpls.size()}${System.lineSeparator()}"
        logger.lifecycle('[verifyForgeHookCoverage] passed (mc1201 shared). effect={} ray={} marker={}', effectCatalogImpls.size(), rayCatalogImpls.size(), markerCatalogImpls.size())
    }
}

tasks.register('verifyFabricHookManifest') {
    group = 'verification'
    description = 'Verify Fabric unsupported hook manifest explicitly tracks AC hook catalog declarations.'

    def hookCatalog = file('ac/src/main/clojure/cn/li/ac/entity/hook_catalog.clj')
    def manifestFile = file('docs/dev/fabric-hook-support.properties')
    def passMarker = layout.buildDirectory.file('verification/verifyFabricHookManifest/passed.txt')

    inputs.files(hookCatalog, manifestFile)
        .withPropertyName('fabricHookManifestSources')
        .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    outputs.file(passMarker)
    outputs.cacheIf { true }

    doLast {
        def markerFile = passMarker.get().asFile
        if (markerFile.exists()) {
            markerFile.delete()
        }

        [hookCatalog, manifestFile].each { f ->
            if (!f.exists()) {
                throw new GradleException("Required Fabric hook manifest file not found: ${f}")
            }
        }

        def catalogText = hookCatalog.getText('UTF-8')
        def effectCatalogImpls = extractKeywordSet(extractMapBody(catalogText, 'effect-hook->impl-key'))
        def rayCatalogImpls = extractKeywordSet(extractMapBody(catalogText, 'ray-hook->impl-key'))
        def markerCatalogImpls = extractKeywordSet(extractMapBody(catalogText, 'marker-hook->impl-key'))

        def props = new Properties()
        manifestFile.withInputStream { props.load(it) }

        def unsupportedEffects = ((props.getProperty('unsupported.effect.impl.keys') ?: '')
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() }) as Set
        def unsupportedRays = ((props.getProperty('unsupported.ray.impl.keys') ?: '')
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() }) as Set
        def supportedEffects = ((props.getProperty('supported.effect.impl.keys') ?: '')
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() }) as Set
        def supportedRays = ((props.getProperty('supported.ray.impl.keys') ?: '')
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() }) as Set
        def unsupportedMarkers = ((props.getProperty('unsupported.marker.impl.keys') ?: '')
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() }) as Set
        def supportedMarkers = ((props.getProperty('supported.marker.impl.keys') ?: '')
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() }) as Set

        def declaredEffects = unsupportedEffects + supportedEffects
        def declaredRays = unsupportedRays + supportedRays
        def declaredMarkers = unsupportedMarkers + supportedMarkers

        def missingEffectDecl = (effectCatalogImpls - declaredEffects)
        def missingRayDecl = (rayCatalogImpls - declaredRays)
        def missingMarkerDecl = (markerCatalogImpls - declaredMarkers)

        if (!missingEffectDecl.isEmpty() || !missingRayDecl.isEmpty() || !missingMarkerDecl.isEmpty()) {
            throw new GradleException("Fabric hook manifest missing impl keys. effect=${missingEffectDecl} ray=${missingRayDecl} marker=${missingMarkerDecl}")
        }

        markerFile.parentFile.mkdirs()
        markerFile.text = "passed supportedEffect=${supportedEffects.size()} supportedRay=${supportedRays.size()} supportedMarker=${supportedMarkers.size()} unsupportedEffect=${unsupportedEffects.size()} unsupportedRay=${unsupportedRays.size()} unsupportedMarker=${unsupportedMarkers.size()}${System.lineSeparator()}"
        logger.lifecycle('[verifyFabricHookManifest] passed. supported effect={} ray={} marker={}, unsupported effect={} ray={} marker={}',
            supportedEffects.size(), supportedRays.size(), supportedMarkers.size(), unsupportedEffects.size(), unsupportedRays.size(), unsupportedMarkers.size())
    }
}

