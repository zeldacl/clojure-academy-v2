tasks.register('verifyAbilitySkillConfigCoverage') {
    group = 'verification'
    description = 'Verify every current content skill id has a per-skill config entry.'

    doLast {
        def skillConfigFile = file('ac/src/main/clojure/cn/li/ac/ability/skill_config.clj')
        def skillConfigDir = file('ac/src/main/clojure/cn/li/ac/ability/skill_config')
        if (!skillConfigFile.exists()) {
            throw new GradleException("Required ability skill config file not found: ${skillConfigFile}")
        }
        if (!skillConfigDir.exists()) {
            throw new GradleException("Required split ability skill config directory not found: ${skillConfigDir}")
        }

        def skillConfigFiles = [skillConfigFile] + fileTree(skillConfigDir) {
            include '*.clj'
        }.files.toList().sort { it.name }
        def skillConfigText = skillConfigFiles.collect { it.getText('UTF-8') }.join('\n')
        def configured = [] as LinkedHashSet<String>
        def configMatcher = (skillConfigText =~ /\{:id :([a-z0-9-]+)\s+:category-id/)
        configMatcher.each { match -> configured << match[1] }

        def discovered = [] as LinkedHashSet<String>
        fileTree('ac/src/main/clojure/cn/li/ac/content/ability') {
            include '**/*.clj'
            exclude '**/generic/**'
            exclude '**/*_fx.clj'
            exclude '**/build/**', '**/.gradle/**'
        }.files.each { File f ->
            def text = f.getText('UTF-8')
            def matcher = (text =~ /:id\s+:([a-z0-9-]+)/)
            matcher.each { match -> discovered << match[1] }
        }

        def missing = discovered.findAll { !configured.contains(it) }
        def extra = configured.findAll { !discovered.contains(it) }
        if (!missing.isEmpty() || !extra.isEmpty()) {
            throw new GradleException("Per-skill ability config coverage mismatch:\n missing: ${missing}\n extra: ${extra}")
        }

        if (configured.size() != 38) {
            throw new GradleException("Expected 38 configured content skills, found ${configured.size()}: ${configured}")
        }

        logger.lifecycle('[verifyAbilitySkillConfigCoverage] passed. All current defskill! entries have config coverage.')
    }
}

