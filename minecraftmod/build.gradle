tasks.register('verifyRuntimeEventNoThinItemAdapter') {
    group = 'verification'
    description = 'Verify runtime item/entity handling uses formal event/adapter namespaces instead of removed thin adapter namespaces.'

    doLast {
        def deletedAdapter = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/runtime/item_handler_adapter.clj')
        def deletedEntityDamageAdapter = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/runtime/entity_damage_adapter.clj')
        def deletedWorldEffectsAdapter = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/runtime/world_effects_adapter.clj')
        def violations = []
        if (deletedAdapter.exists()) {
            violations << 'mc-1.20.1/src/main/clojure/cn/li/mc1201/runtime/item_handler_adapter.clj must stay deleted'
        }
        if (deletedEntityDamageAdapter.exists()) {
            violations << 'mc-1.20.1/src/main/clojure/cn/li/mc1201/runtime/entity_damage_adapter.clj must stay deleted'
        }
        if (deletedWorldEffectsAdapter.exists()) {
            violations << 'mc-1.20.1/src/main/clojure/cn/li/mc1201/runtime/world_effects_adapter.clj must stay deleted'
        }

        fileTree('.') {
            include 'mc-1.20.1/src/**/*.clj', 'forge-1.20.1/src/**/*.clj', 'fabric-1.20.1/src/**/*.clj'
            exclude '**/build/**', '**/.gradle/**'
        }.files.each { File f ->
            def rel = project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')
            def text = f.getText('UTF-8')
            ['item-handler-adapter', 'item_handler_adapter', 'entity-damage-adapter', 'entity_damage_adapter', 'world-effects-adapter', 'world_effects_adapter'].each { token ->
                if (text.contains(token)) {
                    violations << "${rel}: ${token}"
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("Runtime item adapter residue found:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyRuntimeEventNoThinItemAdapter] passed. Runtime item handling uses shared event helpers.')
    }
}

tasks.register('verifyGuiNetworkTransportBoundaries') {
    group = 'verification'
    description = 'Verify GUI network envelope/codec stays shared and platform transports stay thin.'

    doLast {
        def sharedPacket = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/gui/network/packet.clj')
        def deletedTopLevelPacket = file('mc-1.20.1/src/main/clojure/cn/li/mc1201/gui/network_packet_base.clj')
        def forgeNetwork = file('forge-1.20.1/src/main/clojure/cn/li/forge1201/gui/network.clj')
        def fabricNetwork = file('fabric-1.20.1/src/main/clojure/cn/li/fabric1201/gui/network.clj')
        def violations = []

        if (deletedTopLevelPacket.exists()) {
            violations << 'Top-level GUI network packet namespace must stay deleted; use cn.li.mc1201.gui.network.packet'
        }

        [sharedPacket, forgeNetwork, fabricNetwork].each { File f ->
            if (!f.exists()) {
                violations << "Required GUI network file missing: ${project.rootDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')}"
            }
        }

        if (sharedPacket.exists()) {
            def sharedText = sharedPacket.getText('UTF-8')
            ['request-map', 'response-map', 'push-map', 'normalize-request', 'normalize-response', 'dispatch-client-response!', 'encode-payload-bytes', 'decode-payload-bytes'].each { token ->
                if (!sharedText.contains("defn ${token}")) {
                    violations << "gui/network/packet.clj must define shared GUI network ${token}"
                }
            }
        }

        if (forgeNetwork.exists()) {
            def forgeText = forgeNetwork.getText('UTF-8')
            if (forgeText.contains('cn.li.mc1201.gui.network-packet-base')) {
                violations << 'forge1201.gui.network must require cn.li.mc1201.gui.network.packet'
            }
            ['defn- serialize', 'defn- deserialize'].each { token ->
                if (forgeText.contains(token)) {
                    violations << "forge1201.gui.network must use shared packet-base codec directly, found ${token}"
                }
            }
        }

        if (fabricNetwork.exists()) {
            def fabricText = fabricNetwork.getText('UTF-8')
            if (fabricText.contains('cn.li.ac.config.modid')) {
                violations << 'fabric1201.gui.network must use platform-neutral cn.li.mcmod.config for mod-id'
            }
            if (fabricText.contains('cn.li.mc1201.gui.network-packet-base')) {
                violations << 'fabric1201.gui.network must require cn.li.mc1201.gui.network.packet'
            }
            ['request-map', 'response-map', 'push-map'].each { token ->
                if (!fabricText.contains("packet-base/${token}")) {
                    violations << "fabric1201.gui.network must use packet-base/${token} for GUI envelope"
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException("GUI network transport boundary guard failed:\n - ${violations.join('\n - ')}")
        }

        logger.lifecycle('[verifyGuiNetworkTransportBoundaries] passed. GUI network envelope/codec is shared and transports stay thin.')
    }
}

tasks.register('verifyGuiNamespaceLayout') {
    group = 'verification'
    description = 'Verify migrated GUI helper namespaces stay in their domain subpackages.'

    doLast {
        def violations = []
        def requiredFiles = [
