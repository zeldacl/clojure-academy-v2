plugins {
    id 'java-library' // 必须是 java-library，不能只是 java
    id "dev.clojurephant.clojure"
}
dependencies {
    implementation "org.clojure:clojure:1.11.1"
    api project(':api') // 使用 api 关键字确保依赖向下传递
    implementation project(':mcmod')
    compileOnly 'net.minecraftforge:eventbus:6.0.5'
    testCompileOnly 'net.minecraftforge:eventbus:6.0.5'
}

tasks.matching { it.name == 'checkClojure' }.configureEach {
    def existingArgs = forkOptions.jvmArgs ?: []
    forkOptions.jvmArgs = existingArgs + ['-Dac.check.clojure=true']
    if (project.hasProperty('checkNsOnly')) {
        def requestedNamespaces = project.property('checkNsOnly')
            .toString()
            .split(',')
            .collect { it.trim() }
            .findAll { !it.isEmpty() } as Set
        namespaces.set(requestedNamespaces)
    } else {
        // These namespaces import Minecraft runtime classes that are unavailable
        // in AC checkClojure classpath (platform-agnostic module).
        namespaces.set((namespaces.get() as Set).findAll {
            it != 'cn.li.ac.block.solar-gen.render' &&
            it != 'cn.li.ac.terminal.network'
        } as Set)
    }
}

