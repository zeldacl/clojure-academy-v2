plugins {
    id "dev.architectury.loom"
    id "dev.clojurephant.clojure"
    id "com.github.johnrengelman.shadow"
}

// 物理注入 ac 和 mcmod 的源码与资源 (保持不变)
sourceSets {
    main {
        clojure {
            srcDirs += ["${project(':ac').projectDir}/src/main/clojure",
                        "${project(':mcmod').projectDir}/src/main/clojure"]
        }
        java {
            srcDirs += ["${project(':mcmod').projectDir}/src/main/java",
                        "${project(':ac').projectDir}/src/main/java"]
        }
        resources {
            srcDirs += ["${project(':ac').projectDir}/src/main/resources",
                        "${project(':mcmod').projectDir}/src/main/resources"]
        }
    }
}

loom {
    // 移除 forge {} 块，Fabric 不需要
    
    runs {
        client {
            client()
            configName = "Fabric Client 1.20.1"
            runDir = "run"
        }
        server {
            server()
            configName = "Fabric Server 1.20.1"
            runDir = "run"
        }
        // Fabric 的 DataGen 配置方式不同
        datagen {
            server()
            configName = "Fabric DataGen 1.20.1"
            runDir = "run-data"
            // Fabric Loom 自动处理输出路径，通常不需要像 Forge 那样手动传 programArgs
        }
    }
}

// 资源集处理
def generatedResources = file("src/generated/resources")
sourceSets { 
    main { 
        resources.srcDir generatedResources
    } 
}

dependencies {
    minecraft "com.mojang:minecraft:1.20.1"
    mappings loom.officialMojangMappings()
    
    // --- 核心变化：替换为 Fabric 依赖 ---
    modImplementation "net.fabricmc:fabric-loader:0.15.11" // 建议版本
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.92.0+1.20.1" // Fabric API
    
    // 编译依赖项
    implementation project(':ac')
    implementation project(':mcmod')
    implementation "org.clojure:clojure:1.11.1"
}

shadowJar {
    configurations = [project.configurations.runtimeClasspath]
    archiveClassifier = 'shadow'
    dependencies {
        include(dependency('org.clojure:clojure'))
    }
}

// 配置重映射，Architectury Loom 会自动处理 Fabric 的重映射
remapJar {
    inputFile = shadowJar.archiveFile
    dependsOn shadowJar
}

clojure {
    builds {
        main {
            aotAll() 
            reflection = 'warn'
        }
    }
}

tasks.named('compileClojure').configure {
    dependsOn 'compileJava'
}

