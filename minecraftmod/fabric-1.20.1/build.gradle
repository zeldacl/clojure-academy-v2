plugins {
  id 'java'
  // id 'net.fabricmc.fabric-loom-remap' version "${loom_version}"
  id 'fabric-loom' version '1.6-SNAPSHOT'
  id 'dev.clojurephant.clojure' version '0.9.1'
}

group = rootProject.findProperty('mod_group')
version = "${rootProject.findProperty('mod_version')}-fabric-1.20.1"

base {
	archivesName = project.archives_base_name
}

java {
  // toolchain { languageVersion = JavaLanguageVersion.of(17) }
  // Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

loom {
  // Configure Fabric Loom settings
  splitEnvironmentSourceSets()

	mods {
		"modid" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}
}

clojure {
  builds {
    main {
      aotNamespaces.add('my-mod')
      // Allow reflection for Minecraft classes that may not be available at compile time
      reflection = 'skip'
    }
  }
}

repositories {
  mavenCentral()
  maven { url 'https://maven.fabricmc.net/' }
}

dependencies {
  // Fabric dependencies
  // minecraft "com.mojang:minecraft:${project.minecraft_version}"
  // mappings loom.officialMojangMappings()
  // modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
  // modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
  // To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API. This is technically optional, but you probably want it anyway.
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
  
  // ac (and mcmod via ac) on classpath; ac provides resources
  implementation project(':ac')

  // Clojure
  implementation "org.clojure:clojure:${rootProject.findProperty('clojure_version')}"
  include "org.clojure:clojure:${rootProject.findProperty('clojure_version')}"
  include "org.clojure:spec.alpha:0.3.218"
  include "org.clojure:core.specs.alpha:0.2.62"
}

// Fabric compiles only its own Clojure; ac/mcmod from implementation project(':ac')
sourceSets {
  main {
    java { srcDirs += ["src/main/java"] }
    clojure { srcDirs += ["src/main/clojure"] }
    resources { srcDirs += ["src/main/resources", project(':ac').file('src/main/resources')] }
  }
}

tasks.withType(JavaCompile).configureEach {
  options.encoding = 'UTF-8'
  it.options.release = 21
}

processResources {
  inputs.property "version", project.version
  
  filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

jar {
	inputs.property "archivesName", project.base.archivesName

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}


