plugins {
    id "dev.architectury.loom"
    id "dev.clojurephant.clojure"
    id "com.github.johnrengelman.shadow"
}

apply from: rootProject.file('gradle/platform_build_helpers.gradle')

// tasks.matching { it.name == 'checkClojure' }.configureEach {
