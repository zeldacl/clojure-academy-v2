plugins {
  id 'java'
   id 'net.minecraftforge.gradle' version '[6.0,6.2)'
  id 'dev.clojurephant.clojure' version '0.9.1'
}

group = rootProject.findProperty('mod_group')
version = "${rootProject.findProperty('mod_version')}-forge-1.20.1"

java {
  toolchain { languageVersion = JavaLanguageVersion.of(17) }
}

clojure {
  builds {
    main {
      // Don't AOT compile - load Clojure code at runtime instead
      // This avoids compile-time dependency issues in the core library
      reflection = 'skip'
    }
  }
}

minecraft {
  // mappings channel: rootProject.findProperty('mappings_1201_channel'), version: rootProject.findProperty('mappings_1201_version')
  mappings channel: mapping_channel, version: mapping_version
  runs {
    client {
      workingDirectory project.file('run/client')
      args '--username', 'Dev1201'
      mods { my_mod { source sourceSets.main } }
    }
    server {
      workingDirectory project.file('run/server')
      mods { my_mod { source sourceSets.main } }
    }
    data {
      workingDirectory project.file('run/data')
      args '--client', '--server'
      args '--mod', 'my_mod'
      args '--all'
      args '--output', file('src/main/resources')
      args '--existing', file('src/main/resources')
      mods { my_mod { source sourceSets.main } }
    }
  }
}

repositories {
  mavenCentral()
  maven { url 'https://maven.minecraftforge.net' }
}

dependencies {
  // minecraft "net.minecraftforge:forge:${rootProject.findProperty('minecraft_1201_version')}-${rootProject.findProperty('forge_1201_version')}"
   minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"
   
   implementation "org.clojure:clojure:1.11.1"
   minecraftLibrary "org.clojure:clojure:1.11.1"
   minecraftLibrary "org.clojure:spec.alpha:0.3.218"
   minecraftLibrary "org.clojure:core.specs.alpha:0.2.62"
  // implementation "org.clojure:clojure:${rootProject.findProperty('clojure_version')}"
}

// Make Minecraft libraries available for Clojure compilation (for gen-class)
configurations {
  clojureCompile.extendsFrom implementation
}

// Pull in core resources and source  
sourceSets {
  main {
    java { srcDirs += ["src/main/java"] }
    clojure {
      srcDirs += ["src/main/clojure", "../core/src/main/clojure"]
      // Only include forge-1.20.1 code for compilation; core will be available at runtime
      include "my_mod/forge1201/**"
    }
    resources { srcDirs += ["../core/src/main/resources"] }
  }
}

tasks.withType(JavaCompile).configureEach {
  options.encoding = 'UTF-8'
}

tasks.matching { it.name == 'checkClojure' }.configureEach {
  enabled = false
}
